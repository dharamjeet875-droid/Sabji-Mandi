// ── DATABASE ─────────────────────────────────────────────────
const DBH={"Content-Type":"application/json","apikey":SUPABASE_ANON,"Authorization":"Bearer "+SUPABASE_ANON};

async function dbLoad(){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/mandi_data?id=eq.${ROW_ID}&select=payload`,{headers:DBH});
    if(!r.ok) return null;
    const rows=await r.json();
    if(rows.length&&rows[0].payload) return rows[0].payload;
  }catch(e){ console.error("dbLoad",e); }
  return null;
}
async function dbSave(data){
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/mandi_data`,{
      method:"POST",
      headers:{...DBH,"Prefer":"resolution=merge-duplicates,return=minimal"},
      body:JSON.stringify({id:ROW_ID,payload:data,updated_at:new Date().toISOString()}),
    });
  }catch(e){ console.error("dbSave",e); }
}

// ── WHATSAPP ─────────────────────────────────────────────────
function sendWA(member, billData, tripDate, travelShare, purchasedItems){
  const phone=getPhone(member);
  if(!phone){ alert("Phone number nahi mila!"); return; }
  const items=billData.items||[];
  const lines=items.map(i=>{
    const p=purchasedItems?purchasedItems.find(x=>x.name===i.name):null;
    const rate=p&&p.qty>0?p.totalCost/p.qty:0;
    const total=rate*(i.qty||0);
    return `  • ${EMOJI_MAP[i.name]||"🛒"} ${i.name}: ${i.qty}kg${rate>0?` @ ₹${rate.toFixed(0)}/kg = ₹${total.toFixed(2)}`:""}`;
  }).join("\n");
  const itemsAmt=(billData.amount||0)-travelShare;
  const msg=`🛒 *Sabji Mandi Bill*\n━━━━━━━━━━━━━━━\n📅 Trip: ${tripDate}\n👤 *${member}*\n━━━━━━━━━━━━━━━\n\n🧺 *Aapka Samaan:*\n${lines||"  (koi item nahi)"}\n\n━━━━━━━━━━━━━━━\n🧾 Items: ₹${itemsAmt.toFixed(2)}\n🚗 Travel: ₹${travelShare.toFixed(2)}\n💰 *Kul Bill: ₹${(billData.amount||0).toFixed(2)}*\n━━━━━━━━━━━━━━━\n\nPlease jaldi payment karo 🙏`;
  window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg),"_blank");
}
function sendAllWA(splitResult, tripDate, travelExp, purchasedItems){
  const n=Object.keys(splitResult).length||1;
  const share=(travelExp||0)/n;
  let delay=0;
  Object.entries(splitResult).forEach(([m,d])=>{ setTimeout(()=>sendWA(m,d,tripDate,share,purchasedItems),delay); delay+=800; });
}

// ── CUSTOMER ─────────────────────────────────────────────────
function CustomerScreen({data,setData,activeTrip,member,setView,showToast,getBalance}){
  const [tab,setTab]=useState("order");
  const [myOrders,setMyOrders]=useState({});
  const [submitted,setSubmitted]=useState(false);
  const [activeCat,setActiveCat]=useState("Vegetables");
  const [searchQ,setSearchQ]=useState("");
  const [customItem,setCustomItem]=useState("");
  const [customQty,setCustomQty]=useState("");
  const [customList,setCustomList]=useState([]);

  const ledger=data.ledger&&data.ledger[member]?data.ledger[member]:{payments:[],bills:[]};
  const balance=getBalance(member);
  const existingOrder=activeTrip&&activeTrip.orders?activeTrip.orders.find(o=>o.member===member):null;

  useEffect(()=>{
    if(existingOrder){
      const map={};
      existingOrder.items.forEach(i=>{ if(!i.custom) map[i.name]=i.qty; });
      setMyOrders(map);
      setCustomList(existingOrder.items.filter(i=>i.custom));
      setSubmitted(true);
    } else { setMyOrders({}); setCustomList([]); setSubmitted(false); }
  },[activeTrip?activeTrip.id:null,member]);

  function setQty(name,val){ setMyOrders(o=>({...o,[name]:Math.max(0,val)})); }

  function addCustomItem(){
    const name=customItem.trim();
    const qty=parseFloat(customQty);
    if(!name) return showToast("Item ka naam likho!","#e63946");
    if(!qty||qty<=0) return showToast("Quantity bharo!","#e63946");
    setCustomList(l=>{
      const ex=l.find(i=>i.name.toLowerCase()===name.toLowerCase());
      if(ex) return l.map(i=>i.name.toLowerCase()===name.toLowerCase()?{...i,qty}:i);
      return [...l,{name,qty,custom:true}];
    });
    setCustomItem(""); setCustomQty("");
    showToast("✅ Custom item add ho gaya!");
  }

  function submitOrder(){
    const items=Object.entries(myOrders).filter(([,q])=>Number(q)>0).map(([name,qty])=>({name,qty:Number(qty)}));
    const allItems=[...items,...customList];
    if(!allItems.length) return showToast("Koi item nahi chuna!","#e63946");
    setData(s=>{
      const trips=s.trips.map(t=>{
        if(!activeTrip||t.id!==activeTrip.id) return t;
        return{...t,orders:[...t.orders.filter(o=>o.member!==member),{id:uid(),member,items:allItems}]};
      });
      return{...s,trips};
    });
    setSubmitted(true); showToast("✅ Order place ho gaya!");
  }

  const totalBilled=ledger.bills.reduce((s,b)=>s+b.amount,0);
  const totalPaid=ledger.payments.reduce((s,p)=>s+p.amount,0);

  const displayItems=searchQ
    ?Object.values(CATEGORIES).flat().filter(i=>i.name.toLowerCase().includes(searchQ.toLowerCase()))
    :CATEGORIES[activeCat]||[];

  return(
    <div style={S.screen}>
      <Header title={shortName(member)} subtitle={member} onBack={()=>setView("home")}/>
      <div style={{...S.balBanner,background:balance>0?"linear-gradient(90deg,#c1121f,#e63946)":balance<0?"linear-gradient(90deg,#1a4731,#2d6a4f)":"linear-gradient(90deg,#444,#666)"}}>
        <div>
          <div style={{fontSize:11,opacity:0.8,marginBottom:2}}>Aapka Balance</div>
          <div style={{fontSize:20,fontWeight:900}}>{balance>0?`Aap doge ${fmt(balance)}`:balance<0?`Credit ${fmt(-balance)}`:"Sab Clear ✓"}</div>
        </div>
        <div style={{fontSize:36}}>{balance>0?"📤":balance<0?"💰":"✅"}</div>
      </div>
      <div style={S.tabs}>
        {[["order","🛍 Order"],["account","📒 Account"]].map(([t,label])=>(
          <button key={t} style={{...S.tab,...(tab===t?S.tabActive:{})}} onClick={()=>setTab(t)}>{label}</button>
        ))}
      </div>

      {tab==="order"&&(
        <div style={{padding:"0 14px 110px"}}>
          {!activeTrip?(
            <div style={S.emptyBox}><div style={{fontSize:52}}>🛒</div><p style={S.emptyText}>Koi trip nahi hai.<br/>Admin trip banayega.</p></div>
          ):(
            <>
              <div style={S.tripBanner}><span>📅 Trip: <b>{activeTrip.date}</b></span><span style={{...S.badge,background:"#2d6a4f"}}>Open</span></div>
              <input style={{...S.input,marginBottom:10,marginTop:4}} placeholder="🔍 Item search karo..." value={searchQ} onChange={e=>setSearchQ(e.target.value)}/>
              {!searchQ&&(
                <div style={{display:"flex",gap:8,marginBottom:12,overflowX:"auto",paddingBottom:2}}>

                  <input style={{...S.input,flex:1}} placeholder="Qty" type="number" min="0" step="0.5" value={customQty} onChange={e=>setCustomQty(e.target.value)}/>

                    {customList.map(i=>(

                        <span style={{fontSize:12,fontWeight:700,color:"#b7770d"}}>✏️ {i.name} × {i.qty}</span>
                        <button onClick={()=>setCustomList(l=>l.filter(x=>x.name!==i.name))} style={{background:"none",border:"none",color:"#e63946",cursor:"pointer",fontSize:14,fontWeight:800,padding:"0 2px"}}>×</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {(Object.values(myOrders).some(q=>q>0)||customList.length>0)&&(
                <div style={{...S.summaryCard,marginTop:14}}>
                  <p style={{...S.label,marginTop:0}}>Aapka Order:</p>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {Object.entries(myOrders).filter(([,q])=>q>0).map(([name,qty])=>(
                      <span key={name} style={S.itemTag}>{EMOJI_MAP[name]} {name} × {qty}</span>
                    ))}
                    {customList.map(i=>(
                      <span key={i.name} style={{...S.itemTag,background:"#fff9e6",color:"#b7770d",border:"1px solid #f4d03f"}}>✏️ {i.name} × {i.qty}</span>
                    ))}

              )}

              <div style={S.stickyBottom}>
                <button style={{...S.btn,...S.btnGreen,width:"100%"}} onClick={submitOrder}>
                  {submitted?"✏️ Order Update Karo":"✅ Order Place Karo"}
                </button>
              </div>
            </>
          )}
        </div>
      )}

      {tab==="account"&&(
        <div style={{padding:"0 14px 40px"}}>
          <div style={{...S.summaryCard,marginTop:14}}>
            <div style={S.summaryRow}><span>Total Bill</span><b style={{color:"#e63946"}}>{fmt(totalBilled)}</b></div>
            <div style={S.summaryRow}><span>Total Paid</span><b style={{color:"#2d6a4f"}}>{fmt(totalPaid)}</b></div>
            <div style={{...S.summaryRow,borderTop:"1.5px solid #e8f5e9",paddingTop:10,marginTop:2}}>
              <span style={{fontWeight:800}}>Net Balance</span>
              <b style={{fontSize:17,color:balance>0?"#e63946":"#2d6a4f"}}>
                {balance>0?`Dena hai ${fmt(balance)}`:balance<0?`Credit ${fmt(-balance)}`:"Settled ✓"}
              </b>
            </div>
          </div>
          <p style={S.label}>🧾 Trip Bills</p>
          {ledger.bills.length===0
            ?<div style={S.emptyBox}><p style={S.emptyText}>Koi bill nahi abhi tak.</p></div>
            :[...ledger.bills].reverse().map((bill,idx)=>(
              <div key={idx} style={{...S.histCard,borderLeft:"3px solid #e63946"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><b style={{fontSize:14}}>🗓 {bill.date}</b><div style={{fontSize:11,color:"#888",marginTop:2}}>Mandi Trip</div></div>
                  <span style={{...S.amountBadge,background:"#e63946"}}>{fmt(bill.amount)}</span>
                </div>
                {bill.items&&bill.items.length>0&&(
                  <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:4}}>
                    {bill.items.map(i=><span key={i.name} style={S.itemTag}>{EMOJI_MAP[i.name]||"🛒"} {i.name} × {i.qty}</span>)}
                  </div>
                )}
              </div>
            ))
          }
          <p style={S.label}>💵 Payments</p>
          {ledger.payments.length===0
            ?<div style={S.emptyBox}><p style={S.emptyText}>Koi payment nahi abhi tak.</p></div>
            :[...ledger.payments].reverse().map((pay,idx)=>(
              <div key={idx} style={{...S.histCard,borderLeft:"3px solid #2d6a4f"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><b style={{fontSize:14}}>💰 {pay.note||"Payment"}</b><div style={{fontSize:11,color:"#888",marginTop:2}}>{pay.date}</div></div>
                  <span style={{...S.amountBadge,background:"#2d6a4f"}}>+{fmt(pay.amount)}</span>
                </div>
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

// ── ADMIN ─────────────────────────────────────────────────────
function AdminScreen({data,setData,setView,showToast,getBalance}){
  const [tab,setTab]=useState("trips");
  const [newDate,setNewDate]=useState(todayStr());
  const [selTripId,setSelTripId]=useState(null);
  const [purchCat,setPurchCat]=useState("Vegetables");
  const [purchItem,setPurchItem]=useState("");
  const [purchQty,setPurchQty]=useState("");
  const [purchPrice,setPurchPrice]=useState("");
  const [travelExp,setTravelExp]=useState("");
  const [payMember,setPayMember]=useState("");
  const [payAmount,setPayAmount]=useState("");
  const [payNote,setPayNote]=useState("");
  const [accMember,setAccMember]=useState(MEMBERS[0]);
  const [editEntry,setEditEntry]=useState(null); // {type:"bill"|"payment", id, member}
  const [editAmount,setEditAmount]=useState("");
  const [editNote,setEditNote]=useState("");
  const [editDate,setEditDate]=useState("");
  const [dist,setDist]=useState({});
  const [splitView,setSplitView]=useState("all");
  const [focusItem,setFocusItem]=useState(0);
  const [finalBill,setFinalBill]=useState(null);

  const selTrip=data.trips.find(t=>t.id===selTripId)||data.trips[0]||null;

  useEffect(()=>{
    if(!selTrip) return;
    setDist(prev=>{
      const nd={};
      (selTrip.items||[]).forEach(item=>{
        nd[item.id]=prev[item.id]||{sel:MEMBERS.slice(),customMode:false,customQtys:{},confirmed:false};
      });
      return nd;
    });
    setFinalBill(null);
  },[selTrip?selTrip.id:null]);

  function getDist(id){ return dist[id]||{sel:MEMBERS.slice(),customMode:false,customQtys:{},confirmed:false}; }

  function toggleSel(itemId,member){
    setDist(d=>{
      const cur=getDist(itemId);
      let ns=cur.sel.includes(member)?cur.sel.filter(m=>m!==member):[...cur.sel,member];
      if(ns.length===0) ns=[member];
      return{...d,[itemId]:{...cur,sel:ns,customQtys:{},confirmed:false}};
    });
  }
  function selAll(itemId){
    setDist(d=>({...d,[itemId]:{...getDist(itemId),sel:MEMBERS.slice(),customQtys:{},confirmed:false}}));
  }
  function toggleCustom(itemId){
    setDist(d=>{
      const cur=getDist(itemId);
      const item=selTrip&&selTrip.items?selTrip.items.find(i=>i.id===itemId):null;
      const each=item&&cur.sel.length>0?parseFloat((item.qty/cur.sel.length).toFixed(2)):0;
      const cq={};
      cur.sel.forEach(m=>cq[m]=each);
      return{...d,[itemId]:{...cur,customMode:!cur.customMode,customQtys:cur.customMode?{}:cq,confirmed:false}};
    });
  }
  function setCustQty(itemId,member,val){
    setDist(d=>({...d,[itemId]:{...getDist(itemId),customQtys:{...getDist(itemId).customQtys,[member]:parseFloat(val)||0}}}));
  }
  function confirmItem(itemId){
    setDist(d=>({...d,[itemId]:{...getDist(itemId),confirmed:true}}));
  }

  function calcSplit(trip,distData){
    if(!trip||!trip.items||!trip.items.length) return{};
    const d=distData||dist;
    // Collect all involved members from dist selections
    const involvedSet={};
    trip.items.forEach(item=>{
      const cur=d[item.id]||{sel:MEMBERS.slice(),customMode:false,customQtys:{}};
      cur.sel.forEach(m=>{ involvedSet[m]=true; });
    });
    const involved=Object.keys(involvedSet);
    if(!involved.length) return{};
    const n=involved.length;
    const travShare=(trip.travelExpense||0)/n;
    const res={};
    involved.forEach(m=>{ res[m]={amount:travShare,items:[]}; });
    trip.items.forEach(item=>{
      const cur=d[item.id]||{sel:MEMBERS.slice(),customMode:false,customQtys:{}};
      const elig=cur.sel.filter(m=>res[m]);
      if(!elig.length) return;
      const rate=item.qty>0?item.totalCost/item.qty:0;
      if(cur.customMode&&Object.keys(cur.customQtys).length>0){
        elig.forEach(m=>{
          const q=parseFloat(cur.customQtys[m])||0;
          if(q>0){
            res[m].items.push({name:item.name,qty:q,price:parseFloat((rate*q).toFixed(2))});
            res[m].amount+=rate*q;
          }
        });
      } else {
        const eachQ=parseFloat((item.qty/elig.length).toFixed(2));
        const eachC=parseFloat((rate*eachQ).toFixed(2));
        elig.forEach(m=>{
          res[m].items.push({name:item.name,qty:eachQ,price:eachC});
          res[m].amount+=eachC;
        });
      }
    });
    Object.keys(res).forEach(m=>{ res[m].amount=parseFloat(res[m].amount.toFixed(2)); });
    return res;
  }

  function finalizeSplit(){
    if(!selTrip||!selTrip.items||!selTrip.items.length){
      showToast("Pehle Buy tab mein items add karo!","#e63946"); return;
    }
    const result=calcSplit(selTrip,dist);
    if(!Object.keys(result).length){
      showToast("Koi member select nahi hai items mein!","#e63946"); return;
    }
    setFinalBill(result);
  }

  function getMerged(trip){
    if(!trip||!trip.orders||!trip.orders.length) return[];
    const totals={};
    trip.orders.forEach(order=>{
      (order.items||[]).forEach(i=>{
        const key=i.name+(i.custom?"__c":"");
        if(!totals[key]) totals[key]={name:i.name,total:0,byMember:[],custom:!!i.custom};
        totals[key].total+=Number(i.qty);
        totals[key].byMember.push({member:shortName(order.member),qty:i.qty});
      });
    });
    return Object.values(totals).sort((a,b)=>b.total-a.total);
  }

  function createTrip(){
    if(!newDate) return showToast("Date chunno!","#e63946");
    const trip={id:uid(),date:newDate,status:"open",items:[],orders:[],travelExpense:0};
    setData(s=>({...s,trips:[trip,...s.trips]}));
    setSelTripId(trip.id);
    showToast("🛒 Trip ban gayi!");
  }
  function closeTrip(id){
    setData(s=>({...s,trips:s.trips.map(t=>t.id===id?{...t,status:"closed"}:t)}));
    showToast("Trip band ho gayi.");
  }
  function addItem(){
    if(!purchItem||!purchQty||!purchPrice) return showToast("Sare fields bharo!","#e63946");
    const item={id:uid(),name:purchItem,qty:Number(purchQty),totalCost:Number(purchPrice)};
    setData(s=>({...s,trips:s.trips.map(t=>t.id===(selTrip&&selTrip.id)?{...t,items:[...t.items,item]}:t)}));
    setPurchItem(""); setPurchQty(""); setPurchPrice("");
    showToast("✅ Item add ho gaya!");
  }
  function removeItem(itemId){
    setData(s=>({...s,trips:s.trips.map(t=>t.id===(selTrip&&selTrip.id)?{...t,items:t.items.filter(i=>i.id!==itemId)}:t)}));
  }
  function saveTravelExp(){
    setData(s=>({...s,trips:s.trips.map(t=>t.id===(selTrip&&selTrip.id)?{...t,travelExpense:Number(travelExp)}:t)}));
    showToast("Travel expense save ho gaya!");
  }
  function deleteBill(member, billIdx){
    setData(s=>{
      const nl={...s.ledger};
      const bills=[...nl[member].bills];
      bills.splice(billIdx,1);
      nl[member]={...nl[member],bills};
      return{...s,ledger:nl};
    });
    showToast("Bill delete ho gaya");
  }
  function deletePayment(member, payIdx){
    setData(s=>{
      const nl={...s.ledger};
      const payments=[...nl[member].payments];
      payments.splice(payIdx,1);
      nl[member]={...nl[member],payments};
      return{...s,ledger:nl};
    });
    showToast("Payment delete ho gayi");
  }
  function saveEdit(){
    if(!editEntry) return;
    const amt=parseFloat(editAmount);
    if(!amt||amt<=0) return showToast("Sahi amount bharo!","#e63946");
    setData(s=>{
      const nl={...s.ledger};
      if(editEntry.type==="bill"){
        nl[editEntry.member]={...nl[editEntry.member],bills:nl[editEntry.member].bills.map((b,i)=>
          i===editEntry.idx?{...b,amount:amt,date:editDate||b.date}:b
        )};
      } else {
        nl[editEntry.member]={...nl[editEntry.member],payments:nl[editEntry.member].payments.map((p,i)=>
          i===editEntry.idx?{...p,amount:amt,note:editNote||p.note,date:editDate||p.date}:p
        )};
      }
      return{...s,ledger:nl};
    });
    setEditEntry(null); setEditAmount(""); setEditNote(""); setEditDate("");
    showToast("✅ Entry update ho gayi!");
  }
  function addManualBill(){
    if(!accMember) return;
    const amt=parseFloat(editAmount);
    if(!amt||amt<=0) return showToast("Amount bharo!","#e63946");
    const bill={id:uid(),date:editDate||todayStr(),amount:amt,items:[],note:editNote||"Manual entry"};
    setData(s=>{
      const nl={...s.ledger};
      nl[accMember]={...nl[accMember],bills:[...nl[accMember].bills,bill]};
      return{...s,ledger:nl};
    });
    setEditAmount(""); setEditNote(""); setEditDate("");
    showToast("✅ Bill add ho gaya!");
  }
  function addManualPayment(){
    if(!accMember) return;
    const amt=parseFloat(editAmount);
    if(!amt||amt<=0) return showToast("Amount bharo!","#e63946");
    const pay={id:uid(),date:editDate||todayStr(),amount:amt,note:editNote||"Manual payment"};
    setData(s=>{
      const nl={...s.ledger};
      nl[accMember]={...nl[accMember],payments:[...nl[accMember].payments,pay]};
      return{...s,ledger:nl};
    });
    setEditAmount(""); setEditNote(""); setEditDate("");
    showToast("✅ Payment add ho gayi!");
  }

  function recordPayment(){
    if(!payMember||!payAmount) return showToast("Member aur amount bharo!","#e63946");
    const pay={id:uid(),date:todayStr(),amount:Number(payAmount),note:payNote||"Payment received"};
    setData(s=>({...s,ledger:{...s.ledger,[payMember]:{...s.ledger[payMember],payments:[...s.ledger[payMember].payments,pay]}}}));
    setPayAmount(""); setPayNote("");
    showToast("✅ "+fmt(Number(payAmount))+" record ho gaya");
  }

  const totalItemCost=selTrip&&selTrip.items?selTrip.items.reduce((s,i)=>s+i.totalCost,0):0;
  const totalCost=totalItemCost+(selTrip?selTrip.travelExpense||0:0);
  const mergedOrders=getMerged(selTrip);

  return(
    <div style={S.screen}>
      <Header title="Admin Panel" subtitle="Mandi Manager 🔐" onBack={()=>setView("home")}/>
      <div style={{...S.tabs}}>
        {[["trips","🗓 Trips"],["summary","📊 Summary"],["purchase","🛍 Buy"],["split","💰 Split"],["payments","💵 Pay"],["accounts","📋 Accounts"]].map(([t,label])=>(
          <button key={t} style={{...S.tab,...(tab===t?S.tabActive:{})}} onClick={()=>setTab(t)}>{label}</button>
        ))}
      </div>
      <div style={{padding:"0 14px 60px"}}>

        {/* ── TRIPS ── */}
        {tab==="trips"&&(
          <>
            <p style={S.label}>Nayi Trip</p>
            <div style={{display:"flex",gap:8}}>
              <input type="date" style={{...S.input,flex:1}} value={newDate} onChange={e=>setNewDate(e.target.value)}/>
              <button style={{...S.btn,...S.btnGreen}} onClick={createTrip}>+ Trip</button>
            </div>
            {data.trips.length===0&&<div style={S.emptyBox}><p style={S.emptyText}>Koi trip nahi abhi tak.</p></div>}
            {data.trips.map(trip=>(
              <div key={trip.id} style={{...S.tripCard,border:`2px solid ${selTrip&&selTrip.id===trip.id?"#2d6a4f":"transparent"}`}} onClick={()=>setSelTripId(trip.id)}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><b>📅 {trip.date}</b><div style={{fontSize:12,color:"#888",marginTop:2}}>{trip.orders.length} orders · {trip.items.length} items</div></div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{...S.badge,background:trip.status==="open"?"#2d6a4f":trip.status==="settled"?"#457b9d":"#888"}}>{trip.status}</span>
                    {trip.status==="open"&&<button style={{...S.btn,...S.btnDark,padding:"4px 10px",fontSize:11}} onClick={e=>{e.stopPropagation();closeTrip(trip.id);}}>Close</button>}
                  </div>
                </div>
                {trip.orders.map(o=><div key={o.member} style={{fontSize:12,color:"#555",marginTop:4}}><b>{shortName(o.member)}</b>: {o.items.map(i=>`${EMOJI_MAP[i.name]||""}${i.name}(${i.qty})`).join(", ")}</div>)}
              </div>
            ))}
          </>
        )}

        {/* ── SUMMARY ── */}
        {tab==="summary"&&(
          <>
            {!selTrip?<div style={S.emptyBox}><p style={S.emptyText}>Trips tab se trip chunno.</p></div>:(
              <>
                <div style={S.tripBanner}><span>📅 <b>{selTrip.date}</b></span><span style={{...S.badge,background:"#2d6a4f"}}>{selTrip.status}</span></div>
                <div style={{...S.summaryCard,background:"linear-gradient(135deg,#1a4731,#2d6a4f)",color:"#fff"}}>
                  <div style={{fontSize:13,opacity:0.8,marginBottom:4}}>Orders Mile</div>
                  <div style={{fontSize:28,fontWeight:900}}>{selTrip.orders.length} <span style={{fontSize:14,fontWeight:400}}>members</span></div>
                  <div style={{fontSize:13,opacity:0.8,marginTop:4}}>{mergedOrders.filter(i=>!i.custom).length} items ordered</div>
                </div>
                {mergedOrders.length===0?<div style={S.emptyBox}><p style={S.emptyText}>Koi order nahi abhi tak.</p></div>:(
                  <>
                    <p style={S.label}>🛒 Mandi se lana hai yeh:</p>
                    {mergedOrders.filter(i=>!i.custom).map(item=>(
                      <div key={item.name} style={S.mergeRow}>
                        <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                          <span style={{fontSize:26,minWidth:32,textAlign:"center"}}>{EMOJI_MAP[item.name]||"🛒"}</span>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:800,fontSize:14}}>{item.name}</div>
                            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                              {item.byMember.map(bm=><span key={bm.member} style={S.memberTag}>{bm.member}: {bm.qty}</span>)}
                            </div>
                          </div>
                        </div>
                        <div style={S.totalQtyBadge}>{item.total}<span style={{fontSize:10,fontWeight:600}}> kg</span></div>
                      </div>
                    ))}
                    {mergedOrders.some(i=>i.custom)&&(
                      <>
                        <p style={{...S.label,color:"#b7770d"}}>✏️ Custom Items (Special):</p>
                        {mergedOrders.filter(i=>i.custom).map(item=>(
                          <div key={item.name} style={{...S.mergeRow,background:"#fff9e6",border:"1.5px solid #f4d03f"}}>
                            <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                              <span style={{fontSize:26}}>✏️</span>
                              <div style={{flex:1}}>
                                <div style={{fontWeight:800,fontSize:14,color:"#b7770d"}}>{item.name}</div>
                                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                                  {item.byMember.map(bm=><span key={bm.member} style={{...S.memberTag,background:"#fef9e7",borderColor:"#f4d03f"}}>{bm.member}: {bm.qty}</span>)}
                                </div>
                              </div>
                            </div>
                            <div style={{...S.totalQtyBadge,background:"linear-gradient(135deg,#b7770d,#d4a017)"}}>{item.total}</div>
                          </div>
                        ))}
                      </>
                    )}
                  </>
                )}
              </>
            )}
          </>
        )}

        {/* ── PURCHASE ── */}
        {tab==="purchase"&&(

                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                        <b style={{fontSize:15}}>✏️ Entry Edit Karo</b>
                        <button onClick={()=>{setEditEntry(null);setEditAmount("");setEditNote("");setEditDate("");}} style={{...S.btn,background:"#eee",color:"#333",padding:"4px 12px",fontSize:12}}>Cancel</button>
                      </div>
                      <input type="number" style={{...S.input,marginBottom:8}} placeholder="Amount ₹" value={editAmount} onChange={e=>setEditAmount(e.target.value)}/>
                      {editEntry.type==="payment"&&(
                        <input style={{...S.input,marginBottom:8}} placeholder="Note" value={editNote} onChange={e=>setEditNote(e.target.value)}/>
                      )}
                      <input type="date" style={{...S.input,marginBottom:10}} value={editDate} onChange={e=>setEditDate(e.target.value)}/>
                      <button onClick={saveEdit} style={{...S.btn,...S.btnGreen,width:"100%"}}>✅ Save Changes</button>
                    </div>
                  )}

                  {/* Add manual entry */}
                  <div style={{background:"#f8fdf8",borderRadius:14,padding:14,marginBottom:14,border:"1.5px dashed #b7e4c7"}}>
                    <p style={{...S.label,marginTop:0,fontSize:12}}>➕ Manual Entry Add Karo</p>
                    <input type="number" style={{...S.input,marginBottom:8}} placeholder="Amount ₹" value={editAmount} onChange={e=>setEditAmount(e.target.value)}/>
                    <input style={{...S.input,marginBottom:8}} placeholder="Note / Description" value={editNote} onChange={e=>setEditNote(e.target.value)}/>
                    <input type="date" style={{...S.input,marginBottom:10}} value={editDate} onChange={e=>setEditDate(e.target.value)}/>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={addManualBill} style={{...S.btn,flex:1,background:"#e63946",color:"#fff",fontSize:13}}>+ Bill Add</button>
                      <button onClick={addManualPayment} style={{...S.btn,...S.btnGreen,flex:1,fontSize:13}}>+ Payment Add</button>
                    </div>
                  </div>

                  {/* Bills history */}
                  <p style={S.label}>🧾 Bills ({l.bills.length})</p>
                  {l.bills.length===0?<p style={{color:"#bbb",fontSize:13,marginBottom:12}}>Koi bill nahi abhi tak.</p>:
                    [...l.bills].map((bill,idx)=>(
                      <div key={idx} style={{background:"#fff",borderRadius:12,padding:"12px 14px",marginBottom:8,boxShadow:"0 1px 6px rgba(0,0,0,0.06)",borderLeft:"3px solid #e63946"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                              <b style={{fontSize:14,color:"#e63946"}}>{fmt(bill.amount)}</b>
                              <span style={{fontSize:11,color:"#aaa"}}>📅 {bill.date}</span>
                            </div>
                            {bill.note&&<div style={{fontSize:11,color:"#888"}}>{bill.note}</div>}
                            {bill.items&&bill.items.length>0&&(
                              <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:5}}>
                                {bill.items.map(i=><span key={i.name} style={{...S.itemTag,fontSize:10}}>{EMOJI_MAP[i.name]||"🛒"} {i.name}×{i.qty}</span>)}
                              </div>
                            )}
                          </div>
                          <div style={{display:"flex",gap:6,marginLeft:8,flexShrink:0}}>
                            <button onClick={()=>{setEditEntry({type:"bill",idx,member:accMember});setEditAmount(bill.amount);setEditDate(bill.date);setEditNote("");}} style={{...S.btn,padding:"5px 10px",fontSize:11,background:"#fff9e6",color:"#b7770d",border:"1px solid #f4d03f"}}>✏️</button>
                            <button onClick={()=>{ if(window.confirm("Yeh bill delete karo?")) deleteBill(accMember,idx); }} style={{...S.btn,padding:"5px 10px",fontSize:11,background:"#fdecea",color:"#e63946",border:"1px solid #f5c6cb"}}>🗑</button>
                          </div>
                        </div>
                      </div>
                    ))
                  }

                  {/* Payments history */}
                  <p style={S.label}>💵 Payments ({l.payments.length})</p>
                  {l.payments.length===0?<p style={{color:"#bbb",fontSize:13,marginBottom:12}}>Koi payment nahi abhi tak.</p>:
                    [...l.payments].map((pay,idx)=>(
                      <div key={idx} style={{background:"#fff",borderRadius:12,padding:"12px 14px",marginBottom:8,boxShadow:"0 1px 6px rgba(0,0,0,0.06)",borderLeft:"3px solid #2d6a4f"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                              <b style={{fontSize:14,color:"#2d6a4f"}}>+{fmt(pay.amount)}</b>
                              <span style={{fontSize:11,color:"#aaa"}}>📅 {pay.date}</span>
                            </div>
                            <div style={{fontSize:12,color:"#555"}}>{pay.note||"Payment"}</div>
                          </div>
                          <div style={{display:"flex",gap:6,marginLeft:8,flexShrink:0}}>
                            <button onClick={()=>{setEditEntry({type:"payment",idx,member:accMember});setEditAmount(pay.amount);setEditDate(pay.date);setEditNote(pay.note||"");}} style={{...S.btn,padding:"5px 10px",fontSize:11,background:"#fff9e6",color:"#b7770d",border:"1px solid #f4d03f"}}>✏️</button>
                            <button onClick={()=>{ if(window.confirm("Yeh payment delete karo?")) deletePayment(accMember,idx); }} style={{...S.btn,padding:"5px 10px",fontSize:11,background:"#fdecea",color:"#e63946",border:"1px solid #f5c6cb"}}>🗑</button>
                          </div>
                        </div>
                      </div>
                    ))
                  }

                  {/* WhatsApp full statement */}
                  <button onClick={()=>{
                    const phone=getPhone(accMember);
                    if(!phone){ alert("Phone nahi mila!"); return; }
                    const billLines=[...l.bills].reverse().map((b,i)=>`  📌 Bill ${i+1}: ${fmt(b.amount)} — ${b.date}`).join("
")||"  Koi bill nahi";
                    const payLines=[...l.payments].reverse().map((p,i)=>`  ✅ Payment ${i+1}: ${fmt(p.amount)} — ${p.date} (${p.note||""})`).join("
")||"  Koi payment nahi";
                    const bal=getBalance(accMember);
                    const msg=`📋 *Sabji Mandi — Full Account Statement*
👤 *${accMember}*
━━━━━━━━━━━━━━━

🧾 *Bills:*
${billLines}

💵 *Payments:*
${payLines}

━━━━━━━━━━━━━━━
🧾 Total Billed: ${fmt(totalBilled)}
💵 Total Paid: ${fmt(totalPaid)}
💰 *Balance: ${bal>0?`Dena hai ${fmt(bal)}`:bal<0?`Credit ${fmt(-bal)}`:"Sab clear ✓"}*
━━━━━━━━━━━━━━━
Shukriya! 🙏`;
                    window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg),"_blank");
                  }} style={{...S.btn,width:"100%",marginTop:8,background:"#25D366",color:"#fff",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                    📲 Poora Statement WhatsApp Karo
                  </button>
                </>
              );
            })()}
          </>
        )}

      </div>
    </div>
  );
}

// ── APP ROOT ─────────────────────────────────────────────────
function App(){
  const [data,setDataRaw]=useState(null);
  const [view,setView]=useState("home");
  const [selMember,setSelMember]=useState("");
  const [pinInput,setPinInput]=useState("");
  const [pinError,setPinError]=useState(false);
  const [toast,setToast]=useState(null);
  const [saving,setSaving]=useState(false);
  const pollRef=useRef(null);

  useEffect(()=>{
    let loaded=false;
    const to=setTimeout(()=>{ if(!loaded){ setDataRaw(EMPTY_DATA); } },6000);
    dbLoad().then(d=>{ loaded=true; clearTimeout(to); setDataRaw(d||EMPTY_DATA); }).catch(()=>{ loaded=true; clearTimeout(to); setDataRaw(EMPTY_DATA); });
    pollRef.current=setInterval(()=>{ dbLoad().then(d=>{ if(d) setDataRaw(d); }).catch(()=>{}); },12000);
    return()=>clearInterval(pollRef.current);
  },[]);

  const setData=useCallback((updater)=>{
    setSaving(true);
    setDataRaw(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      dbSave(next).finally(()=>setSaving(false));
      return next;
    });
  },[]);

  function showToast(msg,color="#2d6a4f"){ setToast({msg,color}); setTimeout(()=>setToast(null),2800); }

  function getBalance(member){
    const l=data&&data.ledger?data.ledger[member]:null;
    if(!l) return 0;
    return l.bills.reduce((s,b)=>s+b.amount,0)-l.payments.reduce((s,p)=>s+p.amount,0);
  }

  function enterAdmin(){ if(pinInput===ADMIN_PIN){ setPinError(false); setPinInput(""); setView("admin"); } else setPinError(true); }

  const activeTrip=data&&data.trips?data.trips.find(t=>t.status==="open"):null;

  if(!data) return(
    <div style={{...S.root,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column"}}>
      <div style={{fontSize:56,marginBottom:14}}>🛒</div>
      <div style={{fontWeight:800,fontSize:17,color:"#2d6a4f"}}>Loading Sabji Mandi…</div>
      <div style={{fontSize:12,color:"#aaa",marginTop:8}}>Database se connect ho raha hai…</div>
    </div>
  );

  return(
    <div style={S.root}>
      {saving&&<div style={S.savingBar}>💾 Saving…</div>}
      {toast&&<div style={{...S.toast,background:toast.color}}>{toast.msg}</div>}
      {view==="home"&&<HomeScreen setView={setView} selMember={selMember} setSelMember={setSelMember} getBalance={getBalance}/>}
      {view==="customer"&&<CustomerScreen data={data} setData={setData} activeTrip={activeTrip} member={selMember} setView={setView} showToast={showToast} getBalance={getBalance}/>}
      {view==="adminPin"&&<PinScreen pinInput={pinInput} setPinInput={setPinInput} pinError={pinError} enterAdmin={enterAdmin} setView={setView}/>}
      {view==="admin"&&<AdminScreen data={data} setData={setData} setView={setView} showToast={showToast} getBalance={getBalance}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
