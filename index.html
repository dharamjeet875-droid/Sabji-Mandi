function sendWhatsApp(member, billData, tripDate, travelShare, allPurchased) {
  const phone = getPhone(member);
  if(!phone || phone.includes("X")) {
    alert("Pehle " + member + " ka phone number update karo!");
    return;
  }
  const items = billData.items || [];
  const itemLines = items.map(i => {
    const purchased = allPurchased ? allPurchased.find(p => p.name === i.name) : null;
    let pricePerUnit = 0;
    if(purchased && purchased.qty > 0) pricePerUnit = purchased.totalCost / purchased.qty;
    const itemTotal = pricePerUnit * i.qty;
    const priceStr = purchased ? ` @ ₹${pricePerUnit.toFixed(0)}/kg = *₹${itemTotal.toFixed(2)}*` : "";
    return `  • ${EMOJI_MAP[i.name]||"🛒"} ${i.name}: ${i.qty} kg${priceStr}`;
  }).join("\n");
  const itemsTotal = billData.amount - travelShare;
  const msg =
`🛒 *Sabji Mandi Bill*
━━━━━━━━━━━━━━━
📅 Trip: ${tripDate}
👤 *${member}*
━━━━━━━━━━━━━━━

🧺 *Aapka Samaan:*
${itemLines || "  (koi item nahi)"}

━━━━━━━━━━━━━━━
🧾 Items total: ₹${itemsTotal.toFixed(2)}
🚗 Travel share: ₹${travelShare.toFixed(2)}
💰 *Kul Bill: ₹${billData.amount.toFixed(2)}*
━━━━━━━━━━━━━━━

Please jaldi payment karo. Shukriya! 🙏`;

  const url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);
  window.open(url, "_blank");
}

function sendAllWhatsApp(splitResult, tripDate, travelExpense, allPurchased) {
  const numHouses = Object.keys(splitResult).length || 1;
  const travelShare = (travelExpense||0) / numHouses;
  let delay = 0;
  Object.entries(splitResult).forEach(([member, data]) => {
    setTimeout(() => sendWhatsApp(member, data, tripDate, travelShare, allPurchased), delay);
    delay += 800;
  });
}

const dbH = {
  "Content-Type":"application/json",
  "apikey":SUPABASE_ANON,
  "Authorization":"Bearer "+SUPABASE_ANON,
};

async function dbLoad() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/mandi_data?id=eq.${ROW_ID}&select=payload`,{headers:dbH});
    if(!r.ok){console.error("load",r.status,await r.text());return null;}
    const rows = await r.json();
    if(rows.length && rows[0].payload) return rows[0].payload;
  } catch(e){console.error("load ex",e);}
  return null;
}

async function dbSave(data) {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/mandi_data`,{
      method:"POST",
      headers:{...dbH,"Prefer":"resolution=merge-duplicates,return=minimal"},
      body:JSON.stringify({id:ROW_ID,payload:data,updated_at:new Date().toISOString()}),
    });
    if(!r.ok) console.error("save",r.status,await r.text());
  } catch(e){console.error("save ex",e);}
}

              {(Object.values(myOrders).some(q=>q>0)||customList.length>0)&&(

            <div style={S.summaryRow}><span>Total Paid</span><b style={{color:"#2d6a4f"}}>{fmt(totalPaid)}</b></div>

          </div>
          <p style={S.label}>🧾 Trip Bills</p>

                  <span style={{...S.amountBadge,background:"#e63946"}}>{fmt(bill.amount)}</span>

                  <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:4}}>

            :[...ledger.payments].reverse().map((pay,idx)=>(
              <div key={idx} style={{...S.histCard,borderLeft:"3px solid #2d6a4f"}}>

                  <span style={{...S.amountBadge,background:"#2d6a4f"}}>+{fmt(pay.amount)}</span>

}

function AdminScreen({data,setData,setView,showToast,getBalance}){
  const [tab,setTab]=React.useState("trips");
  const [newDate,setNewDate]=React.useState(todayStr());
  const [selTripId,setSelTripId]=React.useState(null);
  const [purchCat,setPurchCat]=React.useState("Vegetables");
  const [purchItem,setPurchItem]=React.useState("");
  const [purchQty,setPurchQty]=React.useState("");
  const [purchPrice,setPurchPrice]=React.useState("");
  const [travelExp,setTravelExp]=React.useState("");
  const [payMember,setPayMember]=React.useState("");
  const [payAmount,setPayAmount]=React.useState("");
  const [payNote,setPayNote]=React.useState("");
  const selTrip=data.trips.find(t=>t.id===selTripId)||data.trips[0];
  // dist: { [itemId]: { sel: [memberName,...], customMode: bool, customQtys: {member:qty}, confirmed: bool } }
  const [dist,setDist]=React.useState({});
  const [splitView,setSplitView]=React.useState("all");
  const [focusItem,setFocusItem]=React.useState(0);
  const [finalBill,setFinalBill]=React.useState(null); // computed after finalize

  // Init dist when trip changes
  React.useEffect(()=>{
    if(!selTrip) return;
    setDist(prev=>{
      const nd={};
      (selTrip.items||[]).forEach(item=>{
        nd[item.id] = prev[item.id] || { sel:MEMBERS.slice(), customMode:false, customQtys:{}, confirmed:false };
      });
      return nd;
    });
    setFinalBill(null);
  },[selTrip ? selTrip.id : null]);

  function getDist(itemId){ if(!itemId) return {sel:MEMBERS.slice(),customMode:false,customQtys:{},confirmed:false}; return dist[itemId]||{sel:MEMBERS.slice(),customMode:false,customQtys:{},confirmed:false}; }

  function toggleSel(itemId, member){
    setDist(d=>{
      const cur=getDist(itemId);
      let newSel=cur.sel.includes(member)?cur.sel.filter(m=>m!==member):[...cur.sel,member];
      if(newSel.length===0) newSel=[member];
      return{...d,[itemId]:{...cur,sel:newSel,customQtys:{},confirmed:false}};
    });
  }
  function selAll(itemId){
    setDist(d=>({...d,[itemId]:{...getDist(itemId),sel:MEMBERS.slice(),customQtys:{},confirmed:false}}));
  }
  function toggleCustom(itemId){
    setDist(d=>{
      const cur=getDist(itemId);
      const item=selTrip?.items.find(i=>i.id===itemId);
      const each=item?parseFloat((item.qty/cur.sel.length).toFixed(2)):0;
      const cq={};
      cur.sel.forEach(m=>cq[m]=each);
      return{...d,[itemId]:{...cur,customMode:!cur.customMode,customQtys:cur.customMode?{}:cq,confirmed:false}};
    });
  }
  function setCustomQty(itemId,member,val){
    setDist(d=>{
      const cur=getDist(itemId);
      return{...d,[itemId]:{...cur,customQtys:{...cur.customQtys,[member]:parseFloat(val)||0}}};
    });
  }
  function confirmItem(itemId){
    setDist(d=>({...d,[itemId]:{...getDist(itemId),confirmed:true}}));
  }

  function calcSmartSplit(trip, distData){
    if(!trip||!trip.orders||!trip.orders.length) return{};
    const d=distData||dist;
    const ordered=trip.orders.map(o=>o.member);
    const numH=ordered.length||1;
    const travShare=(trip.travelExpense||0)/numH;
    const res={};
    ordered.forEach(m=>{ res[m]={amount:travShare,items:[]}; });
    trip.items.forEach(item=>{
      const cur=d[item.id]||{sel:ordered,customMode:false,customQtys:{}};
      const eligible=cur.sel.filter(m=>res[m]!==undefined);
      if(!eligible.length) return;
      const pricePerKg=item.qty>0?item.totalCost/item.qty:0;
      if(cur.customMode && Object.keys(cur.customQtys).length>0){
        eligible.forEach(m=>{
          const q=parseFloat(cur.customQtys[m])||0;
          res[m].items.push({name:item.name,qty:q,price:parseFloat((pricePerKg*q).toFixed(2))});
          res[m].amount+=pricePerKg*q;
        });
      } else {
        const eachQty=parseFloat((item.qty/eligible.length).toFixed(2));
        const eachCost=pricePerKg*eachQty;
        eligible.forEach(m=>{
          res[m].items.push({name:item.name,qty:eachQty,price:parseFloat(eachCost.toFixed(2))});
          res[m].amount+=eachCost;
        });
      }
    });
    // round amounts
    Object.keys(res).forEach(m=>res[m].amount=parseFloat(res[m].amount.toFixed(2)));
    return res;
  }

  function finalizeSplit(){
    if(!selTrip||!selTrip.items||!selTrip.orders||!selTrip.orders.length) {
      showToast("Koi order nahi hai is trip mein!","#e63946");
      return;
    }
    const result=calcSmartSplit(selTrip,dist);
    setFinalBill(result);
  }


  function initials(name){return name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();}
  function getMergedOrders(trip){
    if(!trip||!trip.orders.length)return[];
    const totals={};
    trip.orders.forEach(order=>{
      order.items.forEach(i=>{
        const key=i.name+(i.custom?"__custom":"");
        if(!totals[key])totals[key]={name:i.name,total:0,byMember:[],custom:!!i.custom};
        totals[key].total+=Number(i.qty);
        totals[key].byMember.push({member:shortName(order.member),qty:i.qty});
      });
    });
    return Object.values(totals).sort((a,b)=>b.total-a.total);
  }
  function createTrip(){
    if(!newDate)return showToast("Date ਚੁਣੋ!","#e63946");
    const trip={id:uid(),date:newDate,status:"open",items:[],orders:[],travelExpense:0};
    setData(s=>({...s,trips:[trip,...s.trips]}));
    setSelTripId(trip.id);showToast("🛒 Trip ਬਣ ਗਿਆ!");
  }
  function closeTrip(id){setData(s=>({...s,trips:s.trips.map(t=>t.id===id?{...t,status:"closed"}:t)}));showToast("Trip closed.");}
  function addItem(){
    if(!purchItem||!purchQty||!purchPrice)return showToast("ਸਾਰੇ ਖੇਤਰ ਭਰੋ!","#e63946");
    const item={id:uid(),name:purchItem,qty:Number(purchQty),totalCost:Number(purchPrice)};
    setData(s=>({...s,trips:s.trips.map(t=>t.id===selTrip?.id?{...t,items:[...t.items,item]}:t)}));
    setPurchItem("");setPurchQty("");setPurchPrice("");showToast("✅ Item added!");
  }
  function removeItem(itemId){setData(s=>({...s,trips:s.trips.map(t=>t.id===selTrip?.id?{...t,items:t.items.filter(i=>i.id!==itemId)}:t)}));}
  function saveTravelExp(){setData(s=>({...s,trips:s.trips.map(t=>t.id===selTrip?.id?{...t,travelExpense:Number(travelExp)}:t)}));showToast("Saved!");}

  function settleBills(){
    if(!selTrip)return;
    const split=calcSplit(selTrip);
    if(!Object.keys(split).length)return showToast("No orders!","#e63946");
    setData(s=>{
      const nl={...s.ledger};
      Object.entries(split).forEach(([m,d])=>{nl[m]={...nl[m],bills:[...nl[m].bills,{tripId:selTrip.id,date:selTrip.date,amount:d.amount,items:d.items}]};});
      return{...s,ledger:nl,trips:s.trips.map(t=>t.id===selTrip.id?{...t,status:"settled"}:t)};
    });
    showToast("✅ Bills sent!");
  }
  function recordPayment(){
    if(!payMember||!payAmount)return showToast("ਭਰੋ!","#e63946");
    const pay={id:uid(),date:todayStr(),amount:Number(payAmount),note:payNote||"Payment received"};
    setData(s=>({...s,ledger:{...s.ledger,[payMember]:{...s.ledger[payMember],payments:[...s.ledger[payMember].payments,pay]}}}));
    setPayAmount("");setPayNote("");showToast(`✅ ${fmt(Number(payAmount))} recorded`);
  }
  const totalItemCost=selTrip&&selTrip.items?selTrip.items.reduce((s,i)=>s+i.totalCost,0):0;
  const totalCost=totalItemCost+(selTrip?selTrip.travelExpense||0:0);
  const mergedOrders=getMergedOrders(selTrip);

  return(
    <div style={S.screen}>
      <Header title="Admin Panel" subtitle="Mandi Manager 🔐" onBack={()=>setView("home")}/>
      <div style={{...S.tabs}}>
        {[["trips","🗓 Trips"],["summary","📊 Summary"],["purchase","🛍 Buy"],["split","💰 Split"],["payments","💵 Pay"]].map(([t,label])=>(
          <button key={t} style={{...S.tab,...(tab===t?S.tabActive:{})}} onClick={()=>setTab(t)}>{label}</button>
        ))}
      </div>
      <div style={{padding:"0 14px 60px"}}>

        {tab==="trips"&&(
          <>
            <p style={S.label}>New Trip</p>
            <div style={{display:"flex",gap:8}}>
              <input type="date" style={{...S.input,flex:1}} value={newDate} onChange={e=>setNewDate(e.target.value)}/>
              <button style={{...S.btn,...S.btnGreen}} onClick={createTrip}>+ Trip</button>
            </div>
            {data.trips.length===0&&<div style={S.emptyBox}><p style={S.emptyText}>No trips yet.</p></div>}
            {data.trips.map(trip=>(
              <div key={trip.id} style={{...S.tripCard,border:`2px solid ${selTrip?.id===trip.id?"#2d6a4f":"transparent"}`}} onClick={()=>setSelTripId(trip.id)}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><b>📅 {trip.date}</b><div style={{fontSize:12,color:"#888",marginTop:2}}>{trip.orders.length} orders · {trip.items.length} items</div></div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{...S.badge,background:trip.status==="open"?"#2d6a4f":trip.status==="settled"?"#457b9d":"#888"}}>{trip.status}</span>
                    {trip.status==="open"&&<button style={{...S.btn,...S.btnDark,padding:"4px 10px",fontSize:11}} onClick={e=>{e.stopPropagation();closeTrip(trip.id);}}>Close</button>}
                  </div>
                </div>
                {trip.orders.map(o=><div key={o.member} style={{fontSize:12,color:"#555",marginTop:4}}><b>{shortName(o.member)}</b>: {o.items.map(i=>`${EMOJI_MAP[i.name]||""}${i.name}(${i.qty})`).join(", ")}</div>)}
              </div>
            ))}
          </>
        )}

        {tab==="summary"&&(
          <>
            {!selTrip?<div style={S.emptyBox}><p style={S.emptyText}>Trips tab ਤੋਂ trip ਚੁਣੋ।</p></div>:(
              <>
                <div style={S.tripBanner}><span>📅 <b>{selTrip.date}</b></span><span style={{...S.badge,background:"#2d6a4f"}}>{selTrip.status}</span></div>
                <div style={{...S.summaryCard,background:"linear-gradient(135deg,#1a4731,#2d6a4f)",color:"#fff"}}>
                  <div style={{fontSize:13,opacity:0.8,marginBottom:4}}>Orders Received</div>
                  <div style={{fontSize:28,fontWeight:900}}>{selTrip.orders.length} <span style={{fontSize:14,fontWeight:400}}>members</span></div>
                  <div style={{fontSize:13,opacity:0.8,marginTop:4}}>{mergedOrders.length} unique items ordered</div>
                </div>
                {mergedOrders.length===0?<div style={S.emptyBox}><p style={S.emptyText}>No orders yet.</p></div>:(
                  <>
                    <p style={S.label}>🛒 Regular Items - Kya Lana Hai</p>
                    {mergedOrders.filter(i=>!i.custom).map(item=>(
                      <div key={item.name} style={S.mergeRow}>
                        <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                          <span style={{fontSize:26,minWidth:32,textAlign:"center"}}>{EMOJI_MAP[item.name]||"🛒"}</span>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:800,fontSize:14}}>{item.name}</div>
                            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                              {item.byMember.map(bm=><span key={bm.member} style={S.memberTag}>{bm.member}: {bm.qty}</span>)}
                            </div>
                          </div>
                        </div>
                        <div style={S.totalQtyBadge}>{item.total}<span style={{fontSize:10,fontWeight:600}}> kg</span></div>
                      </div>
                    ))}
                    {mergedOrders.some(i=>i.custom)&&(
                      <>
                        <p style={{...S.label,marginTop:20,color:"#b7770d"}}>✏️ Custom Items (Special Requests)</p>
                        {mergedOrders.filter(i=>i.custom).map(item=>(
                          <div key={item.name} style={{...S.mergeRow,background:"#fff9e6",border:"1.5px solid #f4d03f"}}>
                            <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                              <span style={{fontSize:26,minWidth:32,textAlign:"center"}}>✏️</span>
                              <div style={{flex:1}}>
                                <div style={{fontWeight:800,fontSize:14,color:"#b7770d"}}>{item.name}</div>
                                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                                  {item.byMember.map(bm=><span key={bm.member} style={{...S.memberTag,background:"#fef9e7",borderColor:"#f4d03f"}}>{bm.member}: {bm.qty}</span>)}
                                </div>
                              </div>
                            </div>
                            <div style={{...S.totalQtyBadge,background:"linear-gradient(135deg,#b7770d,#d4a017)"}}>{item.total}<span style={{fontSize:10,fontWeight:600}}> kg</span></div>
                          </div>
                        ))}
                      </>
                    )}
                  </>
                )}
              </>
            )}
          </>
        )}

        {tab==="purchase"&&(
          <>
            {!selTrip?<div style={S.emptyBox}><p style={S.emptyText}>Trips tab ਤੋਂ trip ਚੁਣੋ।</p></div>:(
              <>
                <div style={S.tripBanner}><span>📅 <b>{selTrip.date}</b></span><span style={{...S.badge,background:selTrip.status==="open"?"#2d6a4f":"#888"}}>{selTrip.status}</span></div>

                      {cat==="Vegetables"?"🥦":cat==="Fruits"?"🍎":"🥗"} {cat}
                    </button>
                  ))}
                </div>
                <select style={S.select} value={purchItem} onChange={e=>setPurchItem(e.target.value)}>

                <div style={{display:"flex",gap:8,marginTop:8}}>
                  <input style={{...S.input,flex:1}} placeholder="Qty kg/pcs" type="number" value={purchQty} onChange={e=>setPurchQty(e.target.value)}/>
                  <input style={{...S.input,flex:1}} placeholder="Total ₹ paid" type="number" value={purchPrice} onChange={e=>setPurchPrice(e.target.value)}/>
                </div>
                <button style={{...S.btn,...S.btnGreen,marginTop:8,width:"100%"}} onClick={addItem}>+ Add Item</button>
                {selTrip.items.length>0&&(
                  <>
                    <p style={{...S.label,marginTop:18}}>Purchased</p>
                    {selTrip.items.map(item=>(
                      <div key={item.id} style={S.purchaseRow}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:22}}>{EMOJI_MAP[item.name]||"🛒"}</span>
                          <div><b style={{fontSize:13}}>{item.name}</b><div style={{fontSize:11,color:"#888"}}>{item.qty} kg/pcs</div></div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <b style={{color:"#2d6a4f"}}>{fmt(item.totalCost)}</b>
                          <button style={S.deleteBtn} onClick={()=>removeItem(item.id)}>✕</button>
                        </div>
                      </div>
                    ))}
                    <div style={S.totalRow}><span>Items Total</span><b>{fmt(totalItemCost)}</b></div>
                  </>
                )}
                <p style={{...S.label,marginTop:18}}>Travel Expense</p>
                <div style={{display:"flex",gap:8}}>
                  <input style={{...S.input,flex:1}} placeholder="₹ petrol / auto" type="number" value={travelExp} onChange={e=>setTravelExp(e.target.value)}/>
                  <button style={{...S.btn,...S.btnDark}} onClick={saveTravelExp}>Save</button>
                </div>
                {selTrip.travelExpense>0&&<p style={{fontSize:13,color:"#2d6a4f",marginTop:6}}>Travel: {fmt(selTrip.travelExpense)} · splits equally</p>}
              </>
            )}
          </>
        )}

        {tab==="split"&&(
          <>
            {!selTrip?<div style={S.emptyBox}><p style={S.emptyText}>Trips tab ਤੋਂ trip ਚੁਣੋ।</p></div>:(
              <>
                <div style={S.tripBanner}><span>📅 <b>{selTrip.date}</b></span><span style={{...S.badge,background:selTrip.status==="settled"?"#457b9d":"#2d6a4f"}}>{selTrip.status}</span></div>

                {/* Cost summary bar */}
                <div style={S.summaryCard}>
                  <div style={S.summaryRow}><span>Items Cost</span><b>{fmt(totalItemCost)}</b></div>
                  <div style={S.summaryRow}><span>Travel</span><b>{fmt(selTrip.travelExpense)}</b></div>
                  <div style={{...S.summaryRow,borderTop:"1px solid #eee",paddingTop:8,marginTop:2}}>
                    <span style={{fontWeight:800}}>Grand Total</span><b style={{color:"#2d6a4f",fontSize:18}}>{fmt(totalCost)}</b>
                  </div>
                </div>

                {selTrip.items.length===0
                  ?<div style={S.emptyBox}><p style={S.emptyText}>Pehle Buy tab mein items add karo.</p></div>
                  :(
                  <>
                    {/* View toggle */}
                    <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>
                      <span style={{fontSize:13,fontWeight:800,color:"#555",flex:1}}>📦 Items baanto:</span>
                      <button onClick={()=>{setSplitView("all");}} style={{...S.pill,background:splitView==="all"?"#2d6a4f":"#e8f5e9",color:splitView==="all"?"#fff":"#2d6a4f",fontWeight:800}}>Sab Ek Saath</button>
                      <button onClick={()=>{setSplitView("one");setFocusItem(0);}} style={{...S.pill,background:splitView==="one"?"#2d6a4f":"#e8f5e9",color:splitView==="one"?"#fff":"#2d6a4f",fontWeight:800}}>Ek Ek Karke</button>
                    </div>

                    {/* One-by-one nav */}
                    {splitView==="one"&&(
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,background:"#fff",borderRadius:12,padding:"10px 14px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                        <button onClick={()=>setFocusItem(i=>Math.max(0,i-1))} style={{...S.btn,...S.btnGhost,padding:"8px 16px",opacity:focusItem===0?0.3:1}}>← Pehle</button>
                        <div style={{textAlign:"center"}}>
                          <div style={{fontWeight:800,fontSize:14}}>{selTrip.items[focusItem]?.name}</div>
                          <div style={{fontSize:12,color:"#aaa"}}>{focusItem+1} / {selTrip.items.length}</div>
                        </div>
                        <button onClick={()=>setFocusItem(i=>Math.min(selTrip.items.length-1,i+1))} style={{...S.btn,...S.btnGhost,padding:"8px 16px",opacity:focusItem===selTrip.items.length-1?0.3:1}}>Agla →</button>
                      </div>
                    )}

                    {/* Item cards */}
                    {(splitView==="one"?[selTrip.items[focusItem]]:selTrip.items).filter(Boolean).map(item=>{
                      const d=getDist(item.id);
                      const pricePerKg=item.qty>0?(item.totalCost/item.qty):0;
                      const eachQty=d.sel.length>0?parseFloat((item.qty/d.sel.length).toFixed(2)):0;
                      const eachCost=parseFloat((pricePerKg*eachQty).toFixed(2));
                      const customTotal=Object.values(d.customQtys).reduce((s,v)=>s+(parseFloat(v)||0),0);
                      const customOk=Math.abs(customTotal-item.qty)<0.05;
                      return(
                        <div key={item.id} style={{
                          background:"#fff",borderRadius:18,padding:16,marginBottom:14,
                          boxShadow:"0 2px 16px rgba(0,0,0,0.08)",
                          border:`2px solid ${d.confirmed?"#2d6a4f":"#e8f5e9"}`,
                        }}>
                          {/* Item header */}
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                            <div style={{display:"flex",alignItems:"center",gap:10}}>
                              <span style={{fontSize:30}}>{EMOJI_MAP[item.name]||"🛒"}</span>
                              <div>
                                <b style={{fontSize:16}}>{item.name}</b>
                                <div style={{fontSize:12,color:"#888",marginTop:1}}>{item.qty} kg · {fmt(item.totalCost)} · ₹{pricePerKg.toFixed(0)}/kg</div>
                              </div>
                            </div>
                            {d.confirmed&&<span style={{...S.badge,background:"#2d6a4f",fontSize:12}}>✓ Done</span>}
                          </div>

                          {/* ── MEMBER SELECTOR ── */}
                          <div style={{marginBottom:12}}>
                            <div style={{fontSize:12,fontWeight:800,color:"#666",marginBottom:8}}>Kisne liya? Tap karke choose karo:</div>
                            <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>

                              {/* ALL button */}
                              <button
                                onClick={()=>selAll(item.id)}
                                style={{
                                  padding:"8px 14px",borderRadius:20,border:"2px solid",cursor:"pointer",
                                  fontFamily:"inherit",fontWeight:900,fontSize:12,
                                  background:d.sel.length===MEMBERS.length?"#1a4731":"#fff",
                                  color:d.sel.length===MEMBERS.length?"#fff":"#2d6a4f",
                                  borderColor:d.sel.length===MEMBERS.length?"#1a4731":"#2d6a4f",
                                }}>
                                Sabhi ✓
                              </button>

                              {/* Individual initials */}
                              {MEMBERS.map(m=>{
                                const selected=d.sel.includes(m);
                                return(
                                  <button
                                    key={m}
                                    onClick={()=>toggleSel(item.id,m)}
                                    title={m}
                                    style={{
                                      width:46,height:46,borderRadius:"50%",
                                      border:`3px solid ${selected?"#2d6a4f":"#ddd"}`,
                                      cursor:"pointer",fontFamily:"inherit",fontWeight:900,fontSize:13,
                                      background:selected?"#2d6a4f":"#f5f5f5",
                                      color:selected?"#fff":"#888",
                                      boxShadow:selected?"0 3px 10px rgba(45,106,79,0.4)":"none",
                                      transition:"all 0.15s",
                                    }}>
                                    {initials(m)}
                                  </button>
                                );
                              })}
                            </div>
                            {/* Selected names shown below */}
                            <div style={{fontSize:11,color:"#2d6a4f",fontWeight:700,marginTop:6}}>
                              ✓ {d.sel.map(m=>shortName(m)).join(", ")}
                            </div>
                          </div>

                          {/* ── QUANTITY SPLIT PREVIEW ── */}
                          {!d.customMode&&(
                            <div style={{background:"#f0faf4",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
                              <div style={{fontSize:12,color:"#555",fontWeight:700,marginBottom:4}}>Equal split ({d.sel.length} log):</div>
                              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                                {d.sel.map(m=>(
                                  <span key={m} style={{background:"#fff",border:"1px solid #b7e4c7",borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:700,color:"#1a4731"}}>
                                    {shortName(m)}: {eachQty}kg = {fmt(eachCost)}
                                  </span>
                                ))}
                              </div>
                            </div>
                          )}

                          {/* ── CUSTOM QTY MODE ── */}
                          {d.customMode&&(
                            <div style={{background:"#fffbf0",border:"1.5px solid #f4d03f",borderRadius:12,padding:12,marginBottom:10}}>
                              <div style={{fontSize:12,fontWeight:800,color:"#b7770d",marginBottom:8}}>
                                Custom quantity — Total chahiye: {item.qty} kg
                                <span style={{marginLeft:8,color:customOk?"#2d6a4f":"#e63946"}}>
                                  {customOk?"✅ Sahi hai":"⚠️ "+customTotal.toFixed(2)+" kg"}
                                </span>
                              </div>
                              {d.sel.map(m=>(
                                <div key={m} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                                  <div style={{width:36,height:36,borderRadius:"50%",background:"#2d6a4f",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:12,flexShrink:0}}>
                                    {initials(m)}
                                  </div>
                                  <span style={{fontSize:13,fontWeight:700,flex:1}}>{shortName(m)}</span>
                                  <button style={{...S.qtyBtn}} onClick={()=>setCustomQty(item.id,m,Math.max(0,((parseFloat(d.customQtys[m])||0)-0.5)))}>−</button>
                                  <input type="number" min="0" step="0.5"
                                    style={{width:58,textAlign:"center",fontWeight:800,fontSize:14,border:"1.5px solid #f4d03f",borderRadius:8,padding:"5px 2px",background:"#fff",fontFamily:"inherit"}}
                                    value={d.customQtys[m]!==undefined?d.customQtys[m]:""}
                                    placeholder="0"
                                    onChange={e=>setCustomQty(item.id,m,e.target.value)}
                                  />
                                  <button style={{...S.qtyBtn}} onClick={()=>setCustomQty(item.id,m,((parseFloat(d.customQtys[m])||0)+0.5))}>+</button>
                                  <span style={{fontSize:11,color:"#888",minWidth:48,textAlign:"right"}}>{fmt(pricePerKg*(parseFloat(d.customQtys[m])||0))}</span>
                                </div>
                              ))}
                            </div>
                          )}

                          {/* ── ITEM ACTION BUTTONS ── */}
                          <div style={{display:"flex",gap:8,marginTop:4}}>
                            <button onClick={()=>toggleCustom(item.id)} style={{
                              ...S.btn,flex:1,padding:"9px 10px",fontSize:12,
                              background:d.customMode?"#fff9e6":"#f0f0f0",
                              color:d.customMode?"#b7770d":"#555",
                              border:`1.5px solid ${d.customMode?"#f4d03f":"#ddd"}`,
                            }}>
                              {d.customMode?"✏️ Custom ON":"✏️ Custom Qty"}
                            </button>
                            <button onClick={()=>confirmItem(item.id)} style={{
                              ...S.btn,flex:1,padding:"9px 10px",fontSize:12,
                              background:d.confirmed?"#e8f5e9":"#2d6a4f",
                              color:d.confirmed?"#2d6a4f":"#fff",
                              border:`1.5px solid ${d.confirmed?"#2d6a4f":"transparent"}`,
                            }}>
                              {d.confirmed?"✅ Confirmed!":"✔ Confirm Item"}
                            </button>
                          </div>
                        </div>
                      );
                    })}

                    {/* ── FINALIZE SECTION ── */}
                    {selTrip.status!=="settled"&&(
                      <div style={{background:"#fff",borderRadius:18,padding:16,marginTop:4,boxShadow:"0 2px 16px rgba(0,0,0,0.08)",border:"2px solid #e8f5e9"}}>
                        {/* Progress */}
                        <div style={{marginBottom:12}}>
                          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:700,color:"#555",marginBottom:6}}>
                            <span>Items confirmed</span>
                            <span style={{color:"#2d6a4f"}}>{selTrip.items.filter(i=>dist[i.id]?.confirmed).length} / {selTrip.items.length}</span>
                          </div>
                          <div style={{background:"#e8f5e9",borderRadius:20,height:8}}>
                            <div style={{background:"#2d6a4f",borderRadius:20,height:8,width:`${selTrip.items.length>0?(selTrip.items.filter(i=>dist[i.id]?.confirmed).length/selTrip.items.length)*100:0}%`,transition:"width 0.4s"}}/>
                          </div>
                        </div>

                        {/* Calculate bill preview button */}
                        <button onClick={finalizeSplit} style={{...S.btn,width:"100%",background:"#1a4731",color:"#fff",fontSize:14,marginBottom:10}}>
                          🧮 Calculate & Preview Bills
                        </button>

                        {/* Bill preview after finalize */}
                        {finalBill&&(
                          <>
                            <div style={{fontSize:13,fontWeight:800,color:"#555",marginBottom:10}}>💰 Final Bill Preview:</div>
                            {Object.entries(finalBill).map(([member,bd])=>(
                              <div key={member} style={{...S.billCard,marginBottom:8}}>
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                                    <div style={{width:38,height:38,borderRadius:"50%",background:"#2d6a4f",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13}}>
                                      {initials(member)}
                                    </div>
                                    <div>
                                      <b style={{fontSize:14}}>{member}</b>
                                      <div style={{fontSize:11,color:"#888"}}>{bd.items.length} items</div>
                                    </div>
                                  </div>
                                  <span style={S.amountBadge}>{fmt(bd.amount)}</span>
                                </div>
                                {/* Item breakdown */}
                                <div style={{background:"#f8fdf8",borderRadius:8,padding:"8px 10px",marginBottom:8}}>
                                  {bd.items.map(i=>(
                                    <div key={i.name} style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                                      <span>{EMOJI_MAP[i.name]||"🛒"} {i.name} × {i.qty}kg</span>
                                      <span style={{fontWeight:700,color:"#2d6a4f"}}>{fmt(i.price)}</span>
                                    </div>
                                  ))}
                                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3,color:"#888"}}>
                                    <span>🚗 Travel share</span>
                                    <span>{fmt((selTrip.travelExpense||0)/Object.keys(finalBill).length)}</span>
                                  </div>
                                </div>
                                {/* WhatsApp button per person */}
                                <button
                                  onClick={()=>sendWhatsApp(member,bd,selTrip.date,(selTrip.travelExpense||0)/Object.keys(finalBill).length,selTrip.items)}
                                  style={{width:"100%",padding:"9px",borderRadius:10,border:"none",background:"#25D366",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                                  📲 WhatsApp {shortName(member)}
                                </button>
                              </div>
                            ))}

                            {/* Send all WA */}
                            <button
                              onClick={()=>sendAllWhatsApp(finalBill,selTrip.date,selTrip.travelExpense||0,selTrip.items)}
                              style={{...S.btn,width:"100%",marginBottom:10,fontSize:14,background:"#128C7E",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                              📲 Sabko WhatsApp Bhejo
                            </button>

                            {/* Final settle button */}
                            <button
                              onClick={()=>{
                                if(!finalBill||!Object.keys(finalBill).length)return showToast("Pehle calculate karo!","#e63946");
                                setData(s=>{
                                  const nl={...s.ledger};
                                  Object.entries(finalBill).forEach(([m,d])=>{
                                    nl[m]={...nl[m],bills:[...nl[m].bills,{tripId:selTrip.id,date:selTrip.date,amount:d.amount,items:d.items}]};
                                  });
                                  return{...s,ledger:nl,trips:s.trips.map(t=>t.id===selTrip.id?{...t,status:"settled"}:t)};
                                });
                                showToast("✅ Bills sabko bhej diye!");
                              }}
                              style={{...S.btn,...S.btnGreen,width:"100%",fontSize:15}}>
                              ✅ Final Karo & Sabko Bill Bhejo
                            </button>
                          </>
                        )}
                      </div>
                    )}
                    {selTrip.status==="settled"&&<div style={{textAlign:"center",padding:16,color:"#457b9d",fontWeight:800,fontSize:15,background:"#fff",borderRadius:14,marginTop:8}}>✅ Is trip ke bills bhej diye ja chuke hain</div>}
                  </>
                )}
              </>
            )}
          </>
        }

        {
        tab==="payments"&&(
          <>
            <p style={S.label}>Record Payment Received</p>
            <select style={S.select} value={payMember} onChange={e=>setPayMember(e.target.value)}>
              <option value="">— Member chunno —</option>
              {MEMBERS.map(m=><option key={m} value={m}>{m} · owes {fmt(getBalance(m))}</option>)}
            </select>
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <input style={{...S.input,flex:1}} placeholder="Amount ₹" type="number" value={payAmount} onChange={e=>setPayAmount(e.target.value)}/>
              <input style={{...S.input,flex:1}} placeholder="Note (opt)" value={payNote} onChange={e=>setPayNote(e.target.value)}/>
            </div>
            <button style={{...S.btn,...S.btnGreen,marginTop:10,width:"100%"}} onClick={recordPayment}>
              💵 Payment Record Karo
            </button>

            <p style={{...S.label,marginTop:24}}>Sabka Balance</p>
            {MEMBERS.map(m=>{
              const bal=getBalance(m),l=data.ledger[m];
              return(
                <div key={m} style={S.memberBalCard}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <b style={{fontSize:14}}>👤 {m}</b>
                      <div style={{fontSize:11,color:"#888",marginTop:2}}>Billed: {fmt(l.bills.reduce((s,b)=>s+b.amount,0))} · Paid: {fmt(l.payments.reduce((s,p)=>s+p.amount,0))}</div>
                    </div>
                    <span style={{...S.amountBadge,fontSize:13,background:bal>0?"#e63946":bal<0?"#2d6a4f":"#888"}}>{bal>0?`Owes ${fmt(bal)}`:bal<0?`Cr ${fmt(-bal)}`:"✓ Clear"}</span>
                  </div>
                  {bal>0&&(
                    <button onClick={()=>{
                      const phone=getPhone(m);
                      if(!phone||phone.includes("X")){alert("Phone number update karo!");return;}
                      const msg=`Sat Sri Akal ${shortName(m)} Ji 🙏\n\nAapka Sabji Mandi balance hai: *₹${bal.toFixed(2)}*\nKripaya payment kar do. Shukriya!`;
                      window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg),"_blank");
                    }} style={{marginTop:8,width:"100%",padding:"8px",borderRadius:10,border:"none",background:"#25D366",color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                      📲 Payment Remind — {shortName(m)}
                    </button>
                  )}
                </div>
              );
            })}
          </>
        )}

      </div>
    </div>
  );
}

function App(){
  const [data,setDataRaw]=React.useState(null);
  const [view,setView]=React.useState("home");
  const [selMember,setSelMember]=React.useState("");
  const [pinInput,setPinInput]=React.useState("");
  const [pinError,setPinError]=React.useState(false);
  const [toast,setToast]=React.useState(null);
  const [saving,setSaving]=React.useState(false);
  const pollRef=React.useRef(null);

  React.useEffect(()=>{
    // Load data with 6s timeout fallback
    let loaded=false;
    const timeout=setTimeout(()=>{
      if(!loaded){ console.warn("DB timeout - using empty data"); setDataRaw(EMPTY_DATA); }
    },6000);
    dbLoad().then(d=>{
      loaded=true;
      clearTimeout(timeout);
      setDataRaw(d||EMPTY_DATA);
    }).catch(()=>{
      loaded=true;
      clearTimeout(timeout);
      setDataRaw(EMPTY_DATA);
    });
    pollRef.current=setInterval(()=>{
      dbLoad().then(d=>{ if(d) setDataRaw(d); }).catch(()=>{});
    },12000);
    return()=>{ clearInterval(pollRef.current); };
  },[]);

  const setData=React.useCallback((updater)=>{
    setSaving(true);
    setDataRaw(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      dbSave(next).finally(()=>setSaving(false));
      return next;
    });
  },[]);

  function showToast(msg,color="#2d6a4f"){setToast({msg,color});setTimeout(()=>setToast(null),2800);}

  function getBalance(member){
    const l=data&&data.ledger?data.ledger[member]:null;
    if(!l) return 0;
    return l.bills.reduce((s,b)=>s+b.amount,0)-l.payments.reduce((s,p)=>s+p.amount,0);
  }

  function enterAdmin(){
    if(pinInput===ADMIN_PIN){setPinError(false);setPinInput("");setView("admin");}
    else setPinError(true);
  }

  const activeTrip=data&&data.trips?data.trips.find(t=>t.status==="open"):null;

  if(!data) return(
    <div style={{...S.root,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <div style={{textAlign:"center",color:"#2d6a4f"}}>
        <div style={{fontSize:56,marginBottom:14}}>🛒</div>
        <div style={{fontWeight:800,fontSize:17}}>Loading Sabji Mandi…</div>
        <div style={{fontSize:12,color:"#aaa",marginTop:8}}>Database se connect ho raha hai…</div>
        <div style={{fontSize:11,color:"#ccc",marginTop:4}}>Agar zyada der lage toh internet check karo</div>
      </div>
    </div>
  );

  return(
    <div style={S.root}>
      {saving&&<div style={S.savingBar}>💾 Saving…</div>}
      {toast&&<div style={{...S.toast,background:toast.color}}>{toast.msg}</div>}
      {view==="home"&&<HomeScreen setView={setView} selMember={selMember} setSelMember={setSelMember} getBalance={getBalance}/>}
      {view==="customer"&&<CustomerScreen data={data} setData={setData} activeTrip={activeTrip} member={selMember} setView={setView} showToast={showToast} getBalance={getBalance}/>}
      {view==="adminPin"&&<PinScreen pinInput={pinInput} setPinInput={setPinInput} pinError={pinError} enterAdmin={enterAdmin} setView={setView}/>}
      {view==="admin"&&<AdminScreen data={data} setData={setData} setView={setView} showToast={showToast} getBalance={getBalance}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
