function sendWhatsApp(member, billData, tripDate, travelShare, allPurchased) {
  const phone = getPhone(member);
  if(!phone || phone.includes("X")) {
    alert("Pehle " + member + " ka phone number update karo!");
    return;
  }
  const items = billData.items || [];
  const itemLines = items.map(i => {
    const purchased = allPurchased ? allPurchased.find(p => p.name === i.name) : null;
    let pricePerUnit = 0;
    if(purchased && purchased.qty > 0) pricePerUnit = purchased.totalCost / purchased.qty;
    const itemTotal = pricePerUnit * i.qty;
    const priceStr = purchased ? ` @ ₹${pricePerUnit.toFixed(0)}/kg = *₹${itemTotal.toFixed(2)}*` : "";
    return `  • ${EMOJI_MAP[i.name]||"🛒"} ${i.name}: ${i.qty} kg${priceStr}`;
  }).join("\n");
  const itemsTotal = billData.amount - travelShare;
  const msg =
`🛒 *Sabji Mandi Bill*
━━━━━━━━━━━━━━━
📅 Trip: ${tripDate}
👤 *${member}*
━━━━━━━━━━━━━━━

🧺 *Aapka Samaan:*
${itemLines || "  (koi item nahi)"}

━━━━━━━━━━━━━━━
🧾 Items total: ₹${itemsTotal.toFixed(2)}
🚗 Travel share: ₹${travelShare.toFixed(2)}
💰 *Kul Bill: ₹${billData.amount.toFixed(2)}*
━━━━━━━━━━━━━━━

Please jaldi payment karo. Shukriya! 🙏`;

  const url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);
  window.open(url, "_blank");
}

function sendAllWhatsApp(splitResult, tripDate, travelExpense, allPurchased) {
  const numHouses = Object.keys(splitResult).length || 1;
  const travelShare = (travelExpense||0) / numHouses;
  let delay = 0;
  Object.entries(splitResult).forEach(([member, data]) => {
    setTimeout(() => sendWhatsApp(member, data, tripDate, travelShare, allPurchased), delay);
    delay += 800;
  });
}

const dbH = {
  "Content-Type":"application/json",
  "apikey":SUPABASE_ANON,
  "Authorization":"Bearer "+SUPABASE_ANON,
};

async function dbLoad() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/mandi_data?id=eq.${ROW_ID}&select=payload`,{headers:dbH});
    if(!r.ok){console.error("load",r.status,await r.text());return null;}
    const rows = await r.json();
    if(rows.length && rows[0].payload) return rows[0].payload;
  } catch(e){console.error("load ex",e);}
  return null;
}

async function dbSave(data) {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/mandi_data`,{
      method:"POST",
      headers:{...dbH,"Prefer":"resolution=merge-duplicates,return=minimal"},
      body:JSON.stringify({id:ROW_ID,payload:data,updated_at:new Date().toISOString()}),
    });
    if(!r.ok) console.error("save",r.status,await r.text());
  } catch(e){console.error("save ex",e);}
}

                        <button onClick={()=>removeCustomItem(i.name)} style={{background:"none",border:"none",color:"#e63946",cursor:"pointer",fontSize:14,fontWeight:800,padding:"0 2px"}}>×</button>
                      </div>

              {(Object.values(myOrders).some(q=>q>0)||customList.length>0)&&(
                <div style={{...S.summaryCard,marginTop:14}}>
                  <p style={{...S.label,marginTop:0}}>Your Order:</p>

                    {customList.map(i=>(

                    ))}

                </div>

              <div style={S.stickyBottom}>
                <button style={{...S.btn,...S.btnGreen,width:"100%"}} onClick={submitOrder}>{submitted?"✏️ Update Order":"✅ Place Order"}</button>
              </div>

      )}
      {tab==="account"&&(
        <div style={{padding:"0 14px 40px"}}>
          <div style={{...S.summaryCard,marginTop:14}}>
            <div style={S.summaryRow}><span>Total Billed</span><b style={{color:"#e63946"}}>{fmt(totalBilled)}</b></div>
            <div style={S.summaryRow}><span>Total Paid</span><b style={{color:"#2d6a4f"}}>{fmt(totalPaid)}</b></div>
            <div style={{...S.summaryRow,borderTop:"1.5px solid #e8f5e9",paddingTop:10,marginTop:2}}>

            </div>
          </div>
          <p style={S.label}>🧾 Trip Bills</p>
          {ledger.bills.length===0?<div style={S.emptyBox}><p style={S.emptyText}>No bills yet.</p></div>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><b style={{fontSize:14}}>🗓 {bill.date}</b><div style={{fontSize:11,color:"#888",marginTop:2}}>Mandi Trip</div></div>
                  <span style={{...S.amountBadge,background:"#e63946"}}>{fmt(bill.amount)}</span>
                </div>
                {bill.items?.length>0&&(
                  <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:4}}>
                    {bill.items.map(i=><span key={i.name} style={S.itemTag}>{EMOJI_MAP[i.name]||"🛒"} {i.name} × {i.qty}</span>)}

            ))
          }
          <p style={S.label}>💵 Payments Made</p>
          {ledger.payments.length===0?<div style={S.emptyBox}><p style={S.emptyText}>No payments yet.</p></div>
            :[...ledger.payments].reverse().map((pay,idx)=>(
              <div key={idx} style={{...S.histCard,borderLeft:"3px solid #2d6a4f"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><b style={{fontSize:14}}>💰 {pay.note||"Payment"}</b><div style={{fontSize:11,color:"#888",marginTop:2}}>{pay.date}</div></div>
                  <span style={{...S.amountBadge,background:"#2d6a4f"}}>+{fmt(pay.amount)}</span>
                </div>
              </div>
            ))
          }

      )}
    </div>
  );
}

function AdminScreen({data,setData,setView,showToast,getBalance}){
  const [tab,setTab]=React.useState("trips");
  const [newDate,setNewDate]=React.useState(todayStr());
  const [selTripId,setSelTripId]=React.useState(null);
  const [purchCat,setPurchCat]=React.useState("Vegetables");
  const [purchItem,setPurchItem]=React.useState("");
  const [purchQty,setPurchQty]=React.useState("");
  const [purchPrice,setPurchPrice]=React.useState("");
  const [travelExp,setTravelExp]=React.useState("");
  const [payMember,setPayMember]=React.useState("");
  const [payAmount,setPayAmount]=React.useState("");
  const [payNote,setPayNote]=React.useState("");
  const selTrip=data.trips.find(t=>t.id===selTripId)||data.trips[0];
  // Distribution state: {itemId: {members: Set, customMode: bool, customQtys: {member: qty}}}
  const [distMap,setDistMap]=React.useState({});
  const [splitView,setSplitView]=React.useState("all"); // "all" | "one"
  const [focusItem,setFocusItem]=React.useState(0);

  function initDist(trip){
    if(!trip) return;
    const dm={};
    trip.items.forEach(item=>{
      if(!dm[item.id]) dm[item.id]={members:new Set(MEMBERS),customMode:false,customQtys:{}};
    });
    setDistMap(dm);
  }
  React.useEffect(()=>{if(selTrip) initDist(selTrip);},[selTrip?.id]);

  function toggleMember(itemId, member){
    setDistMap(dm=>{
      const cur=dm[itemId]||{members:new Set(MEMBERS),customMode:false,customQtys:{}};
      const newM=new Set(cur.members);
      if(newM.has(member)) newM.delete(member); else newM.add(member);
      if(newM.size===0) newM.add(member); // keep at least 1
      // reset custom qtys when members change
      return{...dm,[itemId]:{...cur,members:newM,customQtys:{}}};
    });
  }
  function selectAll(itemId){
    setDistMap(dm=>{
      const cur=dm[itemId]||{members:new Set(MEMBERS),customMode:false,customQtys:{}};
      return{...dm,[itemId]:{...cur,members:new Set(MEMBERS),customQtys:{}}};
    });
  }
  function toggleCustom(itemId){
    setDistMap(dm=>{
      const cur=dm[itemId]||{members:new Set(MEMBERS),customMode:false,customQtys:{}};
      // pre-fill equal split
      const mArr=[...cur.members];
      const eachQty=Number((selTrip.items.find(i=>i.id===itemId)?.qty||0)/mArr.length).toFixed(2);
      const cq={};
      mArr.forEach(m=>cq[m]=parseFloat(eachQty));
      return{...dm,[itemId]:{...cur,customMode:!cur.customMode,customQtys:cur.customMode?{}:cq}};
    });
  }
  function setCustomQty(itemId,member,val){
    setDistMap(dm=>{
      const cur=dm[itemId];
      return{...dm,[itemId]:{...cur,customQtys:{...cur.customQtys,[member]:parseFloat(val)||0}}};
    });
  }

  function calcSmartSplit(trip){
    if(!trip||!trip.orders.length) return{};
    const numHouses=trip.orders.length||1;
    const travelShare=(trip.travelExpense||0)/numHouses;
    const res={};
    MEMBERS.forEach(m=>{ if(trip.orders.find(o=>o.member===m)) res[m]={amount:travelShare,items:[]}; });
    trip.items.forEach(item=>{
      const dist=distMap[item.id];
      const mArr=dist?[...dist.members].filter(m=>res[m]!==undefined):Object.keys(res);
      if(!mArr.length) return;
      if(dist?.customMode && Object.keys(dist.customQtys).length){
        mArr.forEach(m=>{
          const q=dist.customQtys[m]||0;
          if(res[m]) res[m].items.push({name:item.name,qty:q});
          const cost=(item.totalCost/item.qty)*q;
          if(res[m]) res[m].amount+=cost;
        });
      } else {
        const eachQty=item.qty/mArr.length;
        const costEach=item.totalCost/mArr.length;
        mArr.forEach(m=>{
          if(res[m]){res[m].items.push({name:item.name,qty:parseFloat(eachQty.toFixed(2))});res[m].amount+=costEach;}
        });
      }
    });
    return res;
  }


  function initials(name){return name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();}
  function getMergedOrders(trip){
    if(!trip||!trip.orders.length)return[];
    const totals={};
    trip.orders.forEach(order=>{
      order.items.forEach(i=>{
        const key=i.name+(i.custom?"__custom":"");
        if(!totals[key])totals[key]={name:i.name,total:0,byMember:[],custom:!!i.custom};
        totals[key].total+=Number(i.qty);
        totals[key].byMember.push({member:shortName(order.member),qty:i.qty});
      });
    });
    return Object.values(totals).sort((a,b)=>b.total-a.total);
  }
  function createTrip(){
    if(!newDate)return showToast("Date ਚੁਣੋ!","#e63946");
    const trip={id:uid(),date:newDate,status:"open",items:[],orders:[],travelExpense:0};
    setData(s=>({...s,trips:[trip,...s.trips]}));
    setSelTripId(trip.id);showToast("🛒 Trip ਬਣ ਗਿਆ!");
  }
  function closeTrip(id){setData(s=>({...s,trips:s.trips.map(t=>t.id===id?{...t,status:"closed"}:t)}));showToast("Trip closed.");}
  function addItem(){
    if(!purchItem||!purchQty||!purchPrice)return showToast("ਸਾਰੇ ਖੇਤਰ ਭਰੋ!","#e63946");
    const item={id:uid(),name:purchItem,qty:Number(purchQty),totalCost:Number(purchPrice)};
    setData(s=>({...s,trips:s.trips.map(t=>t.id===selTrip?.id?{...t,items:[...t.items,item]}:t)}));
    setPurchItem("");setPurchQty("");setPurchPrice("");showToast("✅ Item added!");
  }
  function removeItem(itemId){setData(s=>({...s,trips:s.trips.map(t=>t.id===selTrip?.id?{...t,items:t.items.filter(i=>i.id!==itemId)}:t)}));}
  function saveTravelExp(){setData(s=>({...s,trips:s.trips.map(t=>t.id===selTrip?.id?{...t,travelExpense:Number(travelExp)}:t)}));showToast("Saved!");}

  function settleBills(){
    if(!selTrip)return;
    const split=calcSplit(selTrip);
    if(!Object.keys(split).length)return showToast("No orders!","#e63946");
    setData(s=>{
      const nl={...s.ledger};
      Object.entries(split).forEach(([m,d])=>{nl[m]={...nl[m],bills:[...nl[m].bills,{tripId:selTrip.id,date:selTrip.date,amount:d.amount,items:d.items}]};});
      return{...s,ledger:nl,trips:s.trips.map(t=>t.id===selTrip.id?{...t,status:"settled"}:t)};
    });
    showToast("✅ Bills sent!");
  }
  function recordPayment(){
    if(!payMember||!payAmount)return showToast("ਭਰੋ!","#e63946");
    const pay={id:uid(),date:todayStr(),amount:Number(payAmount),note:payNote||"Payment received"};
    setData(s=>({...s,ledger:{...s.ledger,[payMember]:{...s.ledger[payMember],payments:[...s.ledger[payMember].payments,pay]}}}));
    setPayAmount("");setPayNote("");showToast(`✅ ${fmt(Number(payAmount))} recorded`);
  }
  // splitData replaced by calcSmartSplit
  const totalItemCost=selTrip?.items.reduce((s,i)=>s+i.totalCost,0)||0;
  const totalCost=totalItemCost+(selTrip?.travelExpense||0);
  const mergedOrders=getMergedOrders(selTrip);

  return(
    <div style={S.screen}>
      <Header title="Admin Panel" subtitle="Mandi Manager 🔐" onBack={()=>setView("home")}/>
      <div style={{...S.tabs}}>
        {[["trips","🗓 Trips"],["summary","📊 Summary"],["purchase","🛍 Buy"],["split","💰 Split"],["payments","💵 Pay"]].map(([t,label])=>(
          <button key={t} style={{...S.tab,...(tab===t?S.tabActive:{})}} onClick={()=>setTab(t)}>{label}</button>
        ))}
      </div>
      <div style={{padding:"0 14px 60px"}}>

        {tab==="trips"&&(
          <>
            <p style={S.label}>New Trip</p>
            <div style={{display:"flex",gap:8}}>
              <input type="date" style={{...S.input,flex:1}} value={newDate} onChange={e=>setNewDate(e.target.value)}/>
              <button style={{...S.btn,...S.btnGreen}} onClick={createTrip}>+ Trip</button>
            </div>
            {data.trips.length===0&&<div style={S.emptyBox}><p style={S.emptyText}>No trips yet.</p></div>}
            {data.trips.map(trip=>(
              <div key={trip.id} style={{...S.tripCard,border:`2px solid ${selTrip?.id===trip.id?"#2d6a4f":"transparent"}`}} onClick={()=>setSelTripId(trip.id)}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><b>📅 {trip.date}</b><div style={{fontSize:12,color:"#888",marginTop:2}}>{trip.orders.length} orders · {trip.items.length} items</div></div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{...S.badge,background:trip.status==="open"?"#2d6a4f":trip.status==="settled"?"#457b9d":"#888"}}>{trip.status}</span>
                    {trip.status==="open"&&<button style={{...S.btn,...S.btnDark,padding:"4px 10px",fontSize:11}} onClick={e=>{e.stopPropagation();closeTrip(trip.id);}}>Close</button>}
                  </div>
                </div>
                {trip.orders.map(o=><div key={o.member} style={{fontSize:12,color:"#555",marginTop:4}}><b>{shortName(o.member)}</b>: {o.items.map(i=>`${EMOJI_MAP[i.name]||""}${i.name}(${i.qty})`).join(", ")}</div>)}
              </div>
            ))}
          </>
        )}

        {tab==="summary"&&(
          <>
            {!selTrip?<div style={S.emptyBox}><p style={S.emptyText}>Trips tab ਤੋਂ trip ਚੁਣੋ।</p></div>:(
              <>
                <div style={S.tripBanner}><span>📅 <b>{selTrip.date}</b></span><span style={{...S.badge,background:"#2d6a4f"}}>{selTrip.status}</span></div>
                <div style={{...S.summaryCard,background:"linear-gradient(135deg,#1a4731,#2d6a4f)",color:"#fff"}}>
                  <div style={{fontSize:13,opacity:0.8,marginBottom:4}}>Orders Received</div>
                  <div style={{fontSize:28,fontWeight:900}}>{selTrip.orders.length} <span style={{fontSize:14,fontWeight:400}}>members</span></div>
                  <div style={{fontSize:13,opacity:0.8,marginTop:4}}>{mergedOrders.length} unique items ordered</div>
                </div>
                {mergedOrders.length===0?<div style={S.emptyBox}><p style={S.emptyText}>No orders yet.</p></div>:(
                  <>
                    <p style={S.label}>🛒 Regular Items - Kya Lana Hai</p>
                    {mergedOrders.filter(i=>!i.custom).map(item=>(
                      <div key={item.name} style={S.mergeRow}>
                        <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                          <span style={{fontSize:26,minWidth:32,textAlign:"center"}}>{EMOJI_MAP[item.name]||"🛒"}</span>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:800,fontSize:14}}>{item.name}</div>
                            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                              {item.byMember.map(bm=><span key={bm.member} style={S.memberTag}>{bm.member}: {bm.qty}</span>)}
                            </div>
                          </div>
                        </div>
                        <div style={S.totalQtyBadge}>{item.total}<span style={{fontSize:10,fontWeight:600}}> kg</span></div>
                      </div>
                    ))}
                    {mergedOrders.some(i=>i.custom)&&(
                      <>
                        <p style={{...S.label,marginTop:20,color:"#b7770d"}}>✏️ Custom Items (Special Requests)</p>
                        {mergedOrders.filter(i=>i.custom).map(item=>(
                          <div key={item.name} style={{...S.mergeRow,background:"#fff9e6",border:"1.5px solid #f4d03f"}}>
                            <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                              <span style={{fontSize:26,minWidth:32,textAlign:"center"}}>✏️</span>
                              <div style={{flex:1}}>
                                <div style={{fontWeight:800,fontSize:14,color:"#b7770d"}}>{item.name}</div>
                                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                                  {item.byMember.map(bm=><span key={bm.member} style={{...S.memberTag,background:"#fef9e7",borderColor:"#f4d03f"}}>{bm.member}: {bm.qty}</span>)}
                                </div>
                              </div>
                            </div>
                            <div style={{...S.totalQtyBadge,background:"linear-gradient(135deg,#b7770d,#d4a017)"}}>{item.total}<span style={{fontSize:10,fontWeight:600}}> kg</span></div>
                          </div>
                        ))}
                      </>
                    )}
                  </>
                )}
              </>
            )}
          </>
        )}

        {tab==="purchase"&&(
          <>
            {!selTrip?<div style={S.emptyBox}><p style={S.emptyText}>Trips tab ਤੋਂ trip ਚੁਣੋ।</p></div>:(
              <>
                <div style={S.tripBanner}><span>📅 <b>{selTrip.date}</b></span><span style={{...S.badge,background:selTrip.status==="open"?"#2d6a4f":"#888"}}>{selTrip.status}</span></div>
                <p style={S.label}>Category</p>
                <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                  {Object.keys(CATEGORIES).map(cat=>(
                    <button key={cat} onClick={()=>{setPurchCat(cat);setPurchItem("");}} style={{...S.pill,background:purchCat===cat?"#2d6a4f":"#e8f5e9",color:purchCat===cat?"#fff":"#2d6a4f"}}>
                      {cat==="Vegetables"?"🥦":cat==="Fruits"?"🍎":"🥗"} {cat}

                      <div key={item.id} style={S.purchaseRow}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:22}}>{EMOJI_MAP[item.name]||"🛒"}</span>
                          <div><b style={{fontSize:13}}>{item.name}</b><div style={{fontSize:11,color:"#888"}}>{item.qty} kg/pcs</div></div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <b style={{color:"#2d6a4f"}}>{fmt(item.totalCost)}</b>
                          <button style={S.deleteBtn} onClick={()=>removeItem(item.id)}>✕</button>
                        </div>
                      </div>
                    ))}
                    <div style={S.totalRow}><span>Items Total</span><b>{fmt(totalItemCost)}</b></div>
                  </>
                )}
                <p style={{...S.label,marginTop:18}}>Travel Expense</p>
                <div style={{display:"flex",gap:8}}>
                  <input style={{...S.input,flex:1}} placeholder="₹ petrol / auto" type="number" value={travelExp} onChange={e=>setTravelExp(e.target.value)}/>
                  <button style={{...S.btn,...S.btnDark}} onClick={saveTravelExp}>Save</button>
                </div>
                {selTrip.travelExpense>0&&<p style={{fontSize:13,color:"#2d6a4f",marginTop:6}}>Travel: {fmt(selTrip.travelExpense)} · splits equally</p>}
              </>
            )}
          </>
        )}

        {tab==="split"&&(
          <>
            {!selTrip?<div style={S.emptyBox}><p style={S.emptyText}>Trips tab ਤੋਂ trip ਚੁਣੋ।</p></div>:(
              <>
                <div style={S.tripBanner}><span>📅 <b>{selTrip.date}</b></span><span style={{...S.badge,background:selTrip.status==="settled"?"#457b9d":"#2d6a4f"}}>{selTrip.status}</span></div>

                {/* Cost summary */}
                <div style={S.summaryCard}>
                  <div style={S.summaryRow}><span>Items Cost</span><b>{fmt(totalItemCost)}</b></div>
                  <div style={S.summaryRow}><span>Travel</span><b>{fmt(selTrip.travelExpense)}</b></div>
                  <div style={{...S.summaryRow,borderTop:"1px solid #eee",paddingTop:8,marginTop:2}}>
                    <span style={{fontWeight:800}}>Grand Total</span><b style={{color:"#2d6a4f",fontSize:18}}>{fmt(totalCost)}</b>
                  </div>
                </div>

                {selTrip.items.length===0?<div style={S.emptyBox}><p style={S.emptyText}>Pehle Buy tab mein items add karo.</p></div>:(
                  <>
                    {/* View toggle */}
                    <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>
                      <span style={{fontSize:13,fontWeight:800,color:"#555",flex:1}}>📦 Items distribute karo:</span>
                      <button onClick={()=>setSplitView("all")} style={{...S.pill,background:splitView==="all"?"#2d6a4f":"#e8f5e9",color:splitView==="all"?"#fff":"#2d6a4f"}}>All</button>
                      <button onClick={()=>{setSplitView("one");setFocusItem(0);}} style={{...S.pill,background:splitView==="one"?"#2d6a4f":"#e8f5e9",color:splitView==="one"?"#fff":"#2d6a4f"}}>One by One</button>
                    </div>

                    {/* ONE BY ONE view - nav arrows */}
                    {splitView==="one"&&(
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                        <button onClick={()=>setFocusItem(i=>Math.max(0,i-1))} style={{...S.btn,...S.btnGhost,padding:"8px 18px",opacity:focusItem===0?0.3:1}}>← Prev</button>
                        <span style={{fontWeight:700,fontSize:13,color:"#555"}}>{focusItem+1} / {selTrip.items.length}</span>
                        <button onClick={()=>setFocusItem(i=>Math.min(selTrip.items.length-1,i+1))} style={{...S.btn,...S.btnGhost,padding:"8px 18px",opacity:focusItem===selTrip.items.length-1?0.3:1}}>Next →</button>
                      </div>
                    )}

                    {/* Item cards */}
                    {(splitView==="one"?[selTrip.items[focusItem]]:selTrip.items).map(item=>{
                      const dist=distMap[item.id]||{members:new Set(MEMBERS),customMode:false,customQtys:{}};
                      const selMembers=[...dist.members];
                      const orderedMembers=MEMBERS.filter(m=>selTrip.orders.find(o=>o.member===m));
                      const allSelected=orderedMembers.every(m=>dist.members.has(m));
                      const eachQty=selMembers.length>0?(item.qty/selMembers.length).toFixed(2):0;
                      return(
                        <div key={item.id} style={{background:"#fff",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.08)",border:"1.5px solid #e8f5e9"}}>
                          {/* Item header */}
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                            <div style={{display:"flex",alignItems:"center",gap:10}}>
                              <span style={{fontSize:28}}>{EMOJI_MAP[item.name]||"🛒"}</span>
                              <div>
                                <b style={{fontSize:15}}>{item.name}</b>
                                <div style={{fontSize:12,color:"#888"}}>{item.qty} kg · {fmt(item.totalCost)}</div>
                              </div>
                            </div>
                            <div style={{textAlign:"right"}}>
                              <div style={{fontSize:11,color:"#aaa"}}>Each gets</div>
                              <div style={{fontWeight:900,fontSize:16,color:"#2d6a4f"}}>{dist.customMode?"Custom":eachQty+" kg"}</div>
                            </div>
                          </div>

                          {/* Member selector */}
                          <div style={{marginBottom:10}}>
                            <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:6}}>Kisne liya? Tap karo:</div>
                            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                              {/* All button */}
                              <button onClick={()=>selectAll(item.id)} style={{
                                display:"flex",alignItems:"center",gap:4,padding:"7px 12px",borderRadius:20,border:"none",
                                cursor:"pointer",fontFamily:"inherit",fontWeight:800,fontSize:12,
                                background:allSelected?"#1a4731":"#e8f5e9",color:allSelected?"#fff":"#2d6a4f",
                              }}>All ✓</button>
                              {/* Individual member buttons */}
                              {MEMBERS.map(m=>{
                                const inOrder=!!selTrip.orders.find(o=>o.member===m);
                                const selected=dist.members.has(m);
                                return(
                                  <button key={m} onClick={()=>inOrder&&toggleMember(item.id,m)}
                                    title={m}
                                    style={{
                                      width:40,height:40,borderRadius:"50%",border:"none",cursor:inOrder?"pointer":"default",
                                      fontFamily:"inherit",fontWeight:900,fontSize:13,
                                      background:selected&&inOrder?"#2d6a4f":inOrder?"#e8f5e9":"#f0f0f0",
                                      color:selected&&inOrder?"#fff":inOrder?"#2d6a4f":"#bbb",
                                      opacity:inOrder?1:0.4,
                                      boxShadow:selected&&inOrder?"0 2px 8px rgba(45,106,79,0.4)":"none",
                                      position:"relative",
                                    }}>
                                    {initials(m)}
                                  </button>
                                );
                              })}
                            </div>
                            {/* Selected members names */}
                            <div style={{fontSize:11,color:"#888",marginTop:6}}>
                              {selMembers.map(m=>shortName(m)).join(", ")}
                            </div>
                          </div>

                          {/* Custom qty toggle */}
                          <div style={{borderTop:"1px solid #f0f0f0",paddingTop:10}}>
                            <button onClick={()=>toggleCustom(item.id)} style={{
                              ...S.btn,padding:"7px 14px",fontSize:12,
                              background:dist.customMode?"#1a4731":"#f0f0f0",
                              color:dist.customMode?"#fff":"#555",
                            }}>
                              {dist.customMode?"✏️ Custom Mode ON":"✏️ Custom Quantity"}
                            </button>

                            {dist.customMode&&(
                              <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:6}}>
                                <div style={{fontSize:12,color:"#888",fontWeight:700}}>Har kisi ki quantity set karo (total: {item.qty} kg):</div>
                                {selMembers.map(m=>(
                                  <div key={m} style={{display:"flex",alignItems:"center",gap:10}}>
                                    <div style={{width:36,height:36,borderRadius:"50%",background:"#2d6a4f",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:12,flexShrink:0}}>
                                      {initials(m)}
                                    </div>
                                    <span style={{fontSize:13,fontWeight:700,flex:1,color:"#333"}}>{shortName(m)}</span>
                                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                                      <button style={S.qtyBtn} onClick={()=>setCustomQty(item.id,m,Math.max(0,(dist.customQtys[m]||0)-0.5))}>−</button>
                                      <input type="number" min="0" step="0.5"
                                        style={{width:56,textAlign:"center",fontWeight:800,fontSize:14,border:"1.5px solid #d8eadf",borderRadius:8,padding:"4px 2px",background:"#f8fdf8",fontFamily:"inherit"}}
                                        value={dist.customQtys[m]||""}
                                        placeholder="0"
                                        onChange={e=>setCustomQty(item.id,m,e.target.value)}
                                      />
                                      <button style={S.qtyBtn} onClick={()=>setCustomQty(item.id,m,(dist.customQtys[m]||0)+0.5)}>+</button>
                                    </div>
                                  </div>
                                ))}
                                {/* total check */}
                                <div style={{fontSize:12,marginTop:4,padding:"6px 10px",borderRadius:8,background:Math.abs(Object.values(dist.customQtys).reduce((s,v)=>s+v,0)-item.qty)<0.01?"#e8f5e9":"#fdecea"}}>
                                  {Math.abs(Object.values(dist.customQtys).reduce((s,v)=>s+v,0)-item.qty)<0.01
                                    ?`✅ Total matches: ${item.qty} kg`
                                    :`⚠️ Total: ${Object.values(dist.customQtys).reduce((s,v)=>s+v,0).toFixed(2)} kg (chahiye: ${item.qty} kg)`
                                  }
                                </div>
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}

                    {/* Bill preview */}
                    {selTrip.orders.length>0&&(
                      <>
                        <p style={{...S.label,marginTop:8}}>💰 Bill Preview</p>
                        {Object.entries(calcSmartSplit(selTrip)).map(([member,d])=>(
                          <div key={member} style={S.billCard}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                              <div style={{display:"flex",alignItems:"center",gap:10}}>
                                <div style={{width:38,height:38,borderRadius:"50%",background:"#2d6a4f",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13}}>
                                  {initials(member)}
                                </div>
                                <b style={{fontSize:14}}>{member}</b>
                              </div>
                              <span style={S.amountBadge}>{fmt(d.amount)}</span>
                            </div>
                            <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:4}}>
                              {d.items.map(i=><span key={i.name} style={S.itemTag}>{EMOJI_MAP[i.name]||"🛒"} {i.name} × {i.qty}</span>)}
                            </div>
                            <button
                              onClick={()=>sendWhatsApp(member,d,selTrip.date,(selTrip.travelExpense||0)/Object.keys(calcSmartSplit(selTrip)).length,selTrip.items)}
                              style={{marginTop:10,width:"100%",padding:"9px",borderRadius:10,border:"none",background:"#25D366",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                              <span>📲</span> WhatsApp {shortName(member)}
                            </button>
                          </div>
                        ))}
                      </>
                    )}

                    {selTrip.status!=="settled"&&selTrip.orders.length>0&&(
                      <button
                        onClick={()=>sendAllWhatsApp(calcSmartSplit(selTrip),selTrip.date,selTrip.travelExpense||0,selTrip.items)}
                        style={{...S.btn,width:"100%",marginTop:10,fontSize:14,background:"#25D366",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                        📲 WhatsApp - Sabko Bhejo
                      </button>
                    )}
                    {selTrip.status!=="settled"&&selTrip.orders.length>0&&(
                      <button style={{...S.btn,...S.btnGreen,width:"100%",marginTop:10,fontSize:15}}
                        onClick={()=>{
                          const split=calcSmartSplit(selTrip);
                          if(!Object.keys(split).length)return showToast("No orders!","#e63946");
                          setData(s=>{
                            const nl={...s.ledger};
                            Object.entries(split).forEach(([m,d])=>{nl[m]={...nl[m],bills:[...nl[m].bills,{tripId:selTrip.id,date:selTrip.date,amount:d.amount,items:d.items}]};});
                            return{...s,ledger:nl,trips:s.trips.map(t=>t.id===selTrip.id?{...t,status:"settled"}:t)};
                          });
                          showToast("✅ Bills sent!");
                        }}>
                        ✅ Finalise & Send Bills to All
                      </button>
                    )}
                    {selTrip.status==="settled"&&<div style={{textAlign:"center",padding:16,color:"#457b9d",fontWeight:800,fontSize:15}}>✅ Bills already sent</div>}
                  </>
                )}
              </>
            )}
          </>
        )}

        {tab==="payments"&&(
          <>
            <p style={S.label}>Record Payment Received</p>
            <select style={S.select} value={payMember} onChange={e=>setPayMember(e.target.value)}>
              <option value="">— Member ਚੁਣੋ —</option>
              {MEMBERS.map(m=><option key={m} value={m}>{m} · owes {fmt(getBalance(m))}</option>)}
            </select>
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <input style={{...S.input,flex:1}} placeholder="Amount ₹" type="number" value={payAmount} onChange={e=>setPayAmount(e.target.value)}/>
              <input style={{...S.input,flex:1}} placeholder="Note (opt)" value={payNote} onChange={e=>setPayNote(e.target.value)}/>
            </div>
            <button style={{...S.btn,...S.btnGreen,marginTop:10,width:"100%"}} onClick={recordPayment}>💵 Record Payment</button>
            <p style={{...S.label,marginTop:24}}>All Members Balance</p>
            {MEMBERS.map(m=>{
              const bal=getBalance(m),l=data.ledger[m];
              return(
                <div key={m} style={S.memberBalCard}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <b style={{fontSize:14}}>👤 {m}</b>
                      <div style={{fontSize:11,color:"#888",marginTop:2}}>Billed: {fmt(l.bills.reduce((s,b)=>s+b.amount,0))} · Paid: {fmt(l.payments.reduce((s,p)=>s+p.amount,0))}</div>
                    </div>
                    <span style={{...S.amountBadge,fontSize:13,background:bal>0?"#e63946":bal<0?"#2d6a4f":"#888"}}>{bal>0?`Owes ${fmt(bal)}`:bal<0?`Cr ${fmt(-bal)}`:"✓ Clear"}</span>
                  </div>
                  {bal>0&&(
                    <button onClick={()=>{
                      const phone=getPhone(m);
                      if(!phone||phone.includes("X")){alert("Phone number update karo!");return;}
                      const msg=`Sat Sri Akal ${shortName(m)} Ji 🙏

Aapka Sabji Mandi balance hai: *₹${bal.toFixed(2)}*
Kripaya payment kar do. Shukriya!`;
                      window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg),"_blank");
                    }} style={{marginTop:8,width:"100%",padding:"8px",borderRadius:10,border:"none",background:"#25D366",color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                      📲 Payment Remind - {shortName(m)}
                    </button>
                  )}
                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
  );
}

function App(){
  const [data,setDataRaw]=React.useState(null);
  const [view,setView]=React.useState("home");
  const [selMember,setSelMember]=React.useState("");
  const [pinInput,setPinInput]=React.useState("");
  const [pinError,setPinError]=React.useState(false);
  const [toast,setToast]=React.useState(null);
  const [saving,setSaving]=React.useState(false);
  const pollRef=React.useRef(null);

  React.useEffect(()=>{
    dbLoad().then(d=>{setDataRaw(d||EMPTY_DATA);});
    pollRef.current=setInterval(()=>{dbLoad().then(d=>{if(d)setDataRaw(d);});},10000);
    return()=>clearInterval(pollRef.current);
  },[]);

  const setData=React.useCallback((updater)=>{
    setSaving(true);
    setDataRaw(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      dbSave(next).finally(()=>setSaving(false));
      return next;
    });
  },[]);

  function showToast(msg,color="#2d6a4f"){setToast({msg,color});setTimeout(()=>setToast(null),2800);}
  function getBalance(member){const l=data?.ledger?.[member];if(!l)return 0;return l.bills.reduce((s,b)=>s+b.amount,0)-l.payments.reduce((s,p)=>s+p.amount,0);}
  function enterAdmin(){if(pinInput===ADMIN_PIN){setPinError(false);setPinInput("");setView("admin");}else setPinError(true);}

  const activeTrip=data?.trips?.find(t=>t.status==="open");

  if(!data)return(
    <div style={{...S.root,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <div style={{textAlign:"center",color:"#2d6a4f"}}>
        <div style={{fontSize:56,marginBottom:14}}>🛒</div>
        <div style={{fontWeight:800,fontSize:17}}>Loading Sabji Mandi…</div>
      </div>
    </div>
  );

  return(
    <div style={S.root}>
      {saving&&<div style={S.savingBar}>💾 Saving…</div>}
      {toast&&<div style={{...S.toast,background:toast.color}}>{toast.msg}</div>}
      {view==="home"&&<HomeScreen setView={setView} selMember={selMember} setSelMember={setSelMember} getBalance={getBalance}/>}
      {view==="customer"&&<CustomerScreen data={data} setData={setData} activeTrip={activeTrip} member={selMember} setView={setView} showToast={showToast} getBalance={getBalance}/>}
      {view==="adminPin"&&<PinScreen pinInput={pinInput} setPinInput={setPinInput} pinError={pinError} enterAdmin={enterAdmin} setView={setView}/>}
      {view==="admin"&&<AdminScreen data={data} setData={setData} setView={setView} showToast={showToast} getBalance={getBalance}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
